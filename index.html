<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PredictCup 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0e17;
            color: #e8edf5;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1f2b;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3526;
            border-radius: 8px;
        }

        .app {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* ─── HEADER ─── */
        .header {
            background: linear-gradient(145deg, #141b28, #1a2332);
            border: 1px solid #2a3450;
            border-radius: 20px;
            padding: 20px 28px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand .num {
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, #f0c94b, #f5a623);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand .title {
            font-size: 22px;
            font-weight: 700;
            color: #ffd54a;
            font-family: 'Segoe UI', sans-serif;
        }

        .brand .sub {
            font-size: 11px;
            color: #7f8daa;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .trophy {
            font-size: 32px;
        }

        .header-mid {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #1a2334;
        }

        .players {
            display: flex;
            gap: 16px;
            font-size: 13px;
            font-weight: 600;
            color: #c8d2e6;
        }

        .admin-btn {
            background: #1a1f2b;
            color: #9a9488;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid #2e2818;
            cursor: pointer;
            transition: all 0.2s;
        }

        .admin-btn:hover {
            background: #2a2430;
            color: #e8edf5;
        }

        .admin-btn.active {
            background: #2a1f0a;
            color: #ffd54a;
            border-color: #b8860b;
        }

        .lb-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #1a2334;
        }

        .lb-chip {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #1a1f2b;
            padding: 2px 10px;
            border-radius: 30px;
            border: 1px solid #2e281855;
            font-size: 12px;
        }

        .lb-chip.gold {
            border-color: #ffd54a99;
            box-shadow: 0 0 0 1px #ffd54a33 inset;
        }

        .lb-chip .pts {
            color: #ffd54a;
            font-weight: 700;
        }

        .lb-chip .done {
            color: #6b6450;
            font-size: 11px;
        }

        /* ─── TABS ─── */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: #0f141e;
            padding: 4px;
            border-radius: 12px;
            border: 1px solid #1a2334;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #9a9488;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            min-width: 60px;
            text-align: center;
        }

        .tab-btn:hover {
            color: #e8edf5;
            background: #1a1f2b;
        }

        .tab-btn.active {
            color: #ffd54a;
            background: #1a2334;
            border-bottom: 2px solid #ffd54a;
        }

        .tab-btn .icon {
            display: block;
            font-size: 16px;
            margin-bottom: 2px;
        }

        /* ─── MATCHES ─── */
        .search-wrap {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .search-wrap input {
            flex: 1;
            background: #1a1f2b;
            border: 1px solid #2e2818;
            color: #e8edf5;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            outline: none;
            min-width: 180px;
        }

        .search-wrap input:focus {
            border-color: #ffd54a;
        }

        .group-filter {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .group-filter button {
            background: #1a1f2b;
            border: 1px solid #2e2818;
            color: #9a9488;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .group-filter button.active {
            background: #ffd54a;
            color: #1a1408;
            border-color: #ffd54a;
        }

        .group-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 16px;
        }

        .group-card {
            background: #131b26;
            border-radius: 16px;
            border: 1px solid #253040;
            overflow: hidden;
        }

        .group-header {
            background: #1a2334;
            padding: 10px 16px;
            font-weight: 700;
            font-size: 16px;
            border-bottom: 1px solid #253040;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .group-header .count {
            font-weight: 400;
            font-size: 12px;
            color: #7f8daa;
        }

        .match-item {
            padding: 10px 14px;
            border-bottom: 1px solid #1a2334;
        }

        .match-item:last-child {
            border-bottom: none;
        }

        .match-teams {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .match-teams .vs {
            color: #4f6185;
            font-weight: 300;
            font-size: 12px;
        }

        .match-teams .flag {
            font-size: 14px;
        }

        .match-pred-count {
            font-size: 11px;
            color: #7f8daa;
            margin-bottom: 4px;
        }

        .match-pred-details {
            display: flex;
            flex-wrap: wrap;
            gap: 2px 12px;
            font-size: 12px;
            color: #9aa9c7;
            padding-left: 2px;
        }

        .match-pred-details .pred {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .match-pred-details .pred .name {
            font-weight: 600;
            color: #c8d2e6;
        }

        .match-pred-details .pred .pts {
            font-weight: 600;
        }

        .match-result {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px dashed #1f2a3d;
            font-size: 12px;
        }

        .match-result .label {
            color: #6f7f9e;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .match-result .score {
            font-weight: 700;
            color: #f0c94b;
        }

        .match-result .winner {
            background: #1e2a3f;
            padding: 0 10px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 11px;
            color: #b8ccf0;
        }

        .match-actions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }

        .match-actions button {
            background: #1a1f2b;
            border: 1px solid #2e2818;
            color: #9a9488;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .match-actions button:hover {
            background: #2a2430;
            color: #e8edf5;
        }

        .match-actions button.gold {
            background: #2a1f0a;
            color: #ffd54a;
            border-color: #b8860b;
        }

        /* ─── SEMI-FINAL (special) ─── */
        .semi-final-section {
            margin-top: 20px;
            border-top: 2px solid #1a2334;
            padding-top: 20px;
        }

        .semi-final-section .title {
            font-family: 'Segoe UI', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #ffd54a;
            margin-bottom: 12px;
        }

        .semi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .semi-card {
            background: #131b26;
            border-radius: 16px;
            border: 1px solid #253040;
            padding: 16px;
            text-align: center;
        }

        .semi-card .vs-text {
            font-size: 24px;
            font-weight: 700;
            color: #ffd54a;
            margin: 8px 0;
        }

        .semi-card .teams {
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 18px;
            font-weight: 600;
        }

        .semi-card .teams .flag {
            font-size: 24px;
        }

        .semi-card .actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }

        .semi-card .actions button {
            background: #1a1f2b;
            border: 1px solid #2e2818;
            color: #9a9488;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .semi-card .actions button:hover {
            background: #2a2430;
            color: #e8edf5;
        }

        .semi-card .actions button.gold {
            background: #2a1f0a;
            color: #ffd54a;
            border-color: #b8860b;
        }

        /* ─── SHARE TAB ─── */
        .share-section {
            background: #131b26;
            border-radius: 16px;
            border: 1px solid #253040;
            padding: 20px;
        }

        .share-section .desc {
            font-size: 13px;
            color: #9a9488;
            margin-bottom: 14px;
            line-height: 1.7;
        }

        .share-section .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .share-section .btn-group button {
            background: #1a1f2b;
            border: 1px solid #2e2818;
            color: #9a9488;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .share-section .btn-group button:hover {
            background: #2a2430;
            color: #e8edf5;
        }

        .share-section .btn-group button.gold {
            background: #2a1f0a;
            color: #ffd54a;
            border-color: #b8860b;
        }

        .share-section textarea {
            width: 100%;
            height: 150px;
            background: #0b0e17;
            border: 1px solid #2e2818;
            color: #e8edf5;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            resize: vertical;
            outline: none;
        }

        .share-section textarea:focus {
            border-color: #ffd54a;
        }

        .share-section .preview {
            margin-top: 16px;
            background: #0b0e17;
            border: 1px solid #1a2334;
            border-radius: 8px;
            padding: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .share-section .preview pre {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #6b6450;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
        }

        /* ─── MODAL ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }

        .modal {
            background: #141b28;
            border: 1px solid #2e2818;
            border-radius: 20px;
            padding: 28px 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.8);
            animation: modalIn 0.25s cubic-bezier(0.2, 0.8, 0.3, 1) both;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(6px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal h2 {
            font-family: 'Segoe UI', sans-serif;
            color: #ffd54a;
            font-size: 18px;
            margin-bottom: 4px;
        }

        .modal .sub {
            font-size: 13px;
            color: #9a9488;
            margin-bottom: 12px;
        }

        .modal .field-group {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .modal .field-group label {
            font-weight: 600;
            color: #ffd54a;
            min-width: 52px;
            font-size: 13px;
        }

        .modal .field-group input {
            background: #1a1f2b;
            border: 1px solid #2e2818;
            color: #e8edf5;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 13px;
            outline: none;
            width: 50px;
            text-align: center;
        }

        .modal .field-group input.wide {
            flex: 1;
            min-width: 80px;
            text-align: left;
        }

        .modal .field-group input:focus {
            border-color: #ffd54a;
        }

        .modal .actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .modal .actions button {
            flex: 1;
            background: #1a1f2b;
            border: 1px solid #2e2818;
            color: #9a9488;
            padding: 8px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .modal .actions button:hover {
            background: #2a2430;
            color: #e8edf5;
        }

        .modal .actions button.gold {
            background: #2a1f0a;
            color: #ffd54a;
            border-color: #b8860b;
            flex: 2;
        }

        .modal .actions button.danger {
            background: #4a1818;
            color: #fca5a5;
            border-color: #8a2a2a;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 700px) {
            body {
                padding: 12px;
            }
            .header {
                padding: 16px 18px;
            }
            .brand .num {
                font-size: 28px;
            }
            .brand .title {
                font-size: 18px;
            }
            .group-grid {
                grid-template-columns: 1fr;
            }
            .semi-grid {
                grid-template-columns: 1fr;
            }
            .modal {
                padding: 20px 18px;
            }
            .tabs .tab-btn {
                font-size: 10px;
                padding: 6px 8px;
            }
            .tabs .tab-btn .icon {
                font-size: 14px;
            }
        }

        /* ─── UTILITIES ─── */
        .text-gold {
            color: #ffd54a;
        }
        .text-muted {
            color: #6b6450;
        }
        .text-sm {
            font-size: 13px;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .mb-8 {
            margin-bottom: 8px;
        }
        .flex {
            display: flex;
        }
        .gap-8 {
            gap: 8px;
        }
        .items-center {
            align-items: center;
        }
        .justify-between {
            justify-content: space-between;
        }
        .w-full {
            width: 100%;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>

        function calcPts(preds, result, stage) {
            if (!result?.winner) return {};
            const isBig = BIG_STAGES.includes(stage);
            const isKO = KNOCKOUT_STAGES.includes(stage);
            const winPt = isBig ? 2 : 1;
            const exactPt = isBig ? 3 : 2;
            const drawBonusPt = isBig ? 2.5 : 1.5;
            const actualWasDrawScore = numEq(result.score1, result.score2);

            const out = {};
            PLAYERS.forEach(p => {
                const r = preds?.[p];
                if (!r?.winner) { out[p] = 0; return; }
                const ok = r.winner.trim().toLowerCase() === result.winner.trim().toLowerCase();
                if (!ok) { out[p] = 0; return; }
                const exact = numEq(r.score1, result.score1) && numEq(r.score2, result.score2);
                if (exact) { out[p] = exactPt; return; }
                if (isKO && isPredictedDraw(r) && actualWasDrawScore) { out[p] = drawBonusPt; return; }
                out[p] = winPt;
            });
            return out;

            if (toast) {
                html +=
                    `<div style="position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;background:#1a1408;border:1px solid #ffd54a55;color:#ffd54a;padding:10px 24px;border-radius:40px;font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.7);">${toast}</div>`;
            }

            // ─── PIN MODAL ───
            if (pinOpen) {
                html += `
              <div class="modal-overlay" onclick="if(event.target===this){pinOpen=false;pinVal='';pinErr=false;render();}">
                <div class="modal" onclick="event.stopPropagation();">
                  <h2>🔐 Admin Login</h2>
                  <div class="sub">Enter the admin passcode to edit matches &amp; results.</div>
                  <input class="w-full pc-input" style="text-align:center;font-size:20px;letter-spacing:6px;font-family:monospace;text-transform:uppercase;margin-bottom:8px;"
                    type="password" maxlength="12" placeholder="Passcode" value="${pinVal}"
                    oninput="pinVal=this.value;pinErr=false;render();"
                    onkeydown="if(event.key==='Enter'){if(pinVal.trim().toUpperCase()==='${PIN}'){isAdmin=true;pinOpen=false;pinVal='';pinErr=false;say('👑 Admin mode');render();}else{pinErr=true;render();}}"
                    autofocus />
                  ${pinErr ? '<p style="color:#ef5350;font-size:13px;margin-bottom:8px;">❌ Wrong passcode</p>' : ''}
                  <div class="actions">
                    <button onclick="pinOpen=false;pinVal='';pinErr=false;render();">Cancel</button>
                    <button class="gold" onclick="if(pinVal.trim().toUpperCase()==='${PIN}'){isAdmin=true;pinOpen=false;pinVal='';pinErr=false;say('👑 Admin mode');render();}else{pinErr=true;render();}">Login</button>
                  </div>
                </div>
              </div>
            `;
            }

            // ─── PREDICT MODAL ───
            if (pModal) {
                const match = app.matches.find(m => m.id === pModal);
                if (match) {
                    let fields = '';
                    PLAYERS.forEach(p => {
                        const pr = match.predictions?.[p] || { score1: '', score2: '', winner: '' };
                        fields += `
                    <div class="field-group">
                      <label>${p}</label>
                      <input type="text" id="pred_${p}_s1" value="${pr.score1||''}" placeholder="-" />
                      <span style="color:#4f6185;">–</span>
                      <input type="text" id="pred_${p}_s2" value="${pr.score2||''}" placeholder="-" />
                      <input type="text" class="wide" id="pred_${p}_w" value="${pr.winner||''}" placeholder="Winner or Draw" />
                    </div>
                  `;
                    });
                    html += `
                <div class="modal-overlay" onclick="if(event.target===this){pModal=null;render();}">
                  <div class="modal" onclick="event.stopPropagation();">
                    <h2>✎ Predictions</h2>
                    <div class="sub">${match.team1} vs ${match.team2} <span style="color:#6b6450;font-size:12px;">#${match.id}</span></div>
                    ${fields}
                    <div class="actions">
                      <button onclick="pModal=null;render();">Cancel</button>
                      <button class="gold" onclick="savePreds(${match.id});">💾 Save</button>
                    </div>
                  </div>
                </div>
              `;
                }
            }

            // ─── RESULT MODAL ───
            if (rModal) {
                const match = app.matches.find(m => m.id === rModal);
                if (match) {
                    const res = match.result || { winner: '', score1: '', score2: '' };
                    html += `
                <div class="modal-overlay" onclick="if(event.target===this){rModal=null;render();}">
                  <div class="modal" onclick="event.stopPropagation();">
                    <h2>📊 Set Result</h2>
                    <div class="sub">${match.team1} vs ${match.team2} <span style="color:#6b6450;font-size:12px;">#${match.id}</span></div>
                    <div class="field-group">
                      <span style="font-weight:600;color:#e8edf5;font-size:14px;">${match.team1}</span>
                      <input type="text" id="r_s1" value="${res.score1||''}" placeholder="-" />
                      <span style="color:#4f6185;">–</span>
                      <input type="text" id="r_s2" value="${res.score2||''}" placeholder="-" />
                      <span style="font-weight:600;color:#e8edf5;font-size:14px;">${match.team2}</span>
                    </div>
                    <input class="w-full pc-input" id="r_winner" value="${res.winner||''}" placeholder="Winner (e.g. 'Brazil' or 'Draw')" style="margin-bottom:8px;" />
                    <div class="actions">
                      <button onclick="rModal=null;render();">Cancel</button>
                      ${match.result ? `<button class="danger" onclick="rModal=null;confirmClear=${match.id};render();">↩️ Clear</button>` : ''}
                      <button class="gold" onclick="saveResult(${match.id});">💾 Save</button>
                    </div>
                  </div>
                </div>
              `;
                }
            }

            // ─── CONFIRM CLEAR ───
            if (confirmClear) {
                html += `
              <div class="modal-overlay" onclick="if(event.target===this){confirmClear=null;render();}">
                <div class="modal" onclick="event.stopPropagation();">
                  <h2>⚠️ Clear this result?</h2>
                  <div class="sub">This will remove the result for match #${confirmClear}. This action cannot be undone.</div>
                  <div class="actions">
                    <button onclick="confirmClear=null;render();">Cancel</button>
                    <button class="danger" onclick="withRev(prev=>{const mid=confirmClear;return{...prev,matches:prev.matches.map(m=>m.id===mid?{...m,result:null}:m)}});say('↩️ Result cleared');confirmClear=null;render();">Yes, clear it</button>
                  </div>
                </div>
              </div>
            `;
            }

            // ─── HEADER ───
            html += `
            <div class="header">
              <div class="header-top">
                <div class="brand">
                  <span class="num">26</span>
                  <div>
                    <div class="title">PREDICT CUP</div>
                    <div class="sub">FIFA World Cup 2026 · Fan Edition</div>
                  </div>
                </div>
                <div class="trophy pc-float">🏆</div>
              </div>
              <div class="header-mid">
                <div class="players">${PLAYERS.map(p => `<span>${p}</span>`).join(' ')}</div>
                <div>
                  ${isAdmin ? `<button class="admin-btn active" onclick="isAdmin=false;say('👋 Admin mode off');render();">ADMIN ✕</button>`
                  : `<button class="admin-btn" onclick="pinOpen=true;pinVal='';pinErr=false;render();">🔑 Admin</button>`}
                </div>
              </div>
              <div class="lb-bar">
                ${lb.map((p,i) => `
                  <div class="lb-chip ${i===0 && p.pts > 0 ? 'gold' : ''}">
                    <span>${MEDALS[i]||''}</span>
                    <b>${p.name}</b>
                    <span class="pts">${p.pts}</span>
                  </div>
                `).join('')}
                <div class="lb-chip">
                  <span class="done">📊 ${doneMatches}/${totalMatches}</span>
                </div>
                <div class="lb-chip">
                  <span class="done">🟢 ${new Date(app.updatedAt).toLocaleTimeString()}</span>
                </div>
              </div>
            </div>
          `;

            // ─── TABS ───
            const tabs = [
                ['matches', '📋', 'Matches'],
                ['share', '📤', 'Share']
            ];
            html += `<div class="tabs">`;
            tabs.forEach(([id, icon, label]) => {
                html += `
              <button class="tab-btn ${currentTab === id ? 'active' : ''}" onclick="currentTab='${id}';render();">
                <span class="icon">${icon}</span>${label}
              </button>
            `;
            });
            html += `</div>`;

            // ─── CONTENT ───
            if (currentTab === 'matches') {
                html += `
              <div class="search-wrap">
                <input type="text" placeholder="🔍 Search team..." value="${searchQ}" oninput="searchQ=this.value;render();" />
                <div class="group-filter">
                  ${['ALL','A','B','C','D','E','F','G','H','I','J','K','L'].map(g => `
                    <button class="${grpFilter===g?'active':''}" onclick="grpFilter='${g}';render();">${g}</button>
                  `).join('')}
                </div>
              </div>
            `;

                // Group Stage
                if (filteredGs.length > 0) {
                    const groupsMap = {};
                    filteredGs.forEach(m => {
                        if (!groupsMap[m.group]) groupsMap[m.group] = [];
                        groupsMap[m.group].push(m);
                    });
                    const sortedGroups = Object.keys(groupsMap).sort();
                    html += `<div class="group-grid">`;
                    sortedGroups.forEach(g => {
                        const ms = groupsMap[g];
                        html += `
                  <div class="group-card">
                    <div class="group-header">
                      <span>Group ${g}</span>
                      <span class="count">${ms.length} matches</span>
                    </div>
                    ${ms.map(m => renderMatchItem(m)).join('')}
                  </div>
                `;
                    });
                    html += `</div>`;
                }

                // Knockout (including Semi-finals)
                if (filteredKo.length > 0) {
                    const stageOrder = ["Round of 32", "Round of 16", "Quarter-final", "Semi-final", "3rd Place", "Final"];
                    stageOrder.forEach(stage => {
                        const ms = filteredKo.filter(m => m.stage === stage);
                        if (ms.length === 0) return;
                        // Special styling for Semi-final
                        if (stage === "Semi-final") {
                            html += `
                    <div class="semi-final-section">
                      <div class="title">🔥 SEMI-FINAL</div>
                      <div class="semi-grid">
                        ${ms.map(m => `
                          <div class="semi-card">
                            <div class="teams">
                              <span><span class="flag">${flagOf(m.team1)}</span> ${m.team1}</span>
                              <span class="vs-text">VS</span>
                              <span>${m.team2} <span class="flag">${flagOf(m.team2)}</span></span>
                            </div>
                            ${m.result ? `<div style="margin-top:8px;font-weight:600;color:#f0c94b;">${m.result.winner} ${m.result.score1}–${m.result.score2}</div>` : ''}
                            <div class="actions">
                              ${isAdmin ? `<button class="gold" onclick="pModal=${m.id};render();">✎ Predict</button>` : ''}
                              ${isAdmin ? `<button class="gold" onclick="rModal=${m.id};render();">📊 Set Result</button>` : ''}
                            </div>
                          </div>
                        `).join('')}
                      </div>
                    </div>
                  `;
                        } else {
                            html += `
                    <div style="font-family:inherit;font-size:18px;font-weight:700;color:#ffd54a;margin:20px 0 12px 0;">${STAGE_ICO[stage]||'🏟️'} ${stage}</div>
                    <div class="group-grid">
                      ${ms.map(m => renderMatchItem(m)).join('')}
                    </div>
                  `;
                        }
                    });
                }

                if (filteredGs.length === 0 && filteredKo.length === 0) {
                    html += `
                <div style="text-align:center;padding:48px 20px;background:#131b26;border-radius:16px;border:1px solid #253040;">
                  <div style="font-size:48px;">🔍</div>
                  <div style="font-weight:600;margin-top:8px;color:#9a9488;">No matches found</div>
                  <div style="font-size:13px;color:#6b6450;margin-top:4px;">Try a different team name or clear filters</div>
                </div>
              `;
                }
            }

            // ─── SHARE TAB ───
            if (currentTab === 'share') {
                const jsonStr = JSON.stringify(app, null, 2);
                html += `
              <div class="share-section">
                <h2 style="font-family:inherit;font-size:22px;font-weight:700;color:#ffd54a;margin-bottom:8px;">📤 Share Data</h2>
                <div class="desc">
                  Copy the JSON below to share your data with friends, or paste JSON to import.
                  <br><span style="color:#6b6450;">All data is stored locally in your browser.</span>
                </div>
                <div class="btn-group">
                  <button class="gold" onclick="navigator.clipboard.writeText(JSON.stringify(app,null,2)).then(()=>say('✅ Copied!')).catch(()=>say('❌ Failed to copy'));">📋 Copy JSON</button>
                  <button onclick="const blob=new Blob([JSON.stringify(app,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='predictions.json';a.click();">💾 Download</button>
                  <button onclick="if(confirm('Clear all data?')){localStorage.removeItem(SK);location.reload();}">🗑️ Clear Data</button>
                </div>
                <textarea placeholder="Paste JSON here to import..." oninput="impTxt=this.value;impErr='';">${impTxt}</textarea>
                ${impErr ? `<p style="color:#ef5350;font-size:13px;margin-top:6px;">❌ ${impErr}</p>` : ''}
                <button class="gold" style="margin-top:10px;padding:6px 20px;border-radius:8px;border:none;font-weight:700;cursor:pointer;" onclick="doImport();">📥 Import</button>
                <div class="preview">
                  <div style="font-weight:600;color:#9a9488;font-size:12px;margin-bottom:6px;">📄 Current data (${app.matches.length} matches, rev ${app.rev || 0})</div>
                  <pre>${jsonStr.slice(0, 1200)}${jsonStr.length > 1200 ? '...' : ''}</pre>
                </div>
              </div>
            `;
            }

            root.innerHTML = html;
        }

        // ─── RENDER MATCH ITEM ───
        function renderMatchItem(m) {
            const predCount = PLAYERS.filter(p => m.predictions?.[p]?.winner).length;
            const totalPlayers = PLAYERS.length;
            let predDetails = '';
            PLAYERS.forEach(p => {
                const pr = m.predictions?.[p];
                if (!pr) return;
                const pts = m.result?.winner ? (calcPts({ [p]: pr }, m.result, m.stage)[p] ?? 0) : 0;
                const ptsStr = m.result?.winner ? `${pts}pt` : '—';
                predDetails += `
              <span class="pred">
                <span class="name">${p}:</span>
                ${pr.score1 || '?'}–${pr.score2 || '?'}
                <span class="pts" style="color:${pts > 0 ? '#4ade80' : '#fca5a5'};">(${ptsStr})</span>
              </span>
            `;
            });

            let resultHtml = '';
            if (m.result?.winner) {
                resultHtml = `
              <div class="match-result">
                <span class="label">📊 result</span>
                <span class="score">${m.result.score1}–${m.result.score2}</span>
                <span class="winner">${m.result.winner}</span>
              </div>
            `;
            }

            let actionsHtml = '';
            if (isAdmin) {
                actionsHtml = `
              <div class="match-actions">
                <button onclick="pModal=${m.id};render();">✎ Pred</button>
                <button onclick="rModal=${m.id};render();">📊 Result</button>
                ${m.stage !== 'Group Stage' ? `<button onclick="editKO=${m.id};render();">✎ Edit</button>` : ''}
                ${m.stage !== 'Group Stage' ? `<button style="color:#fca5a5;border-color:#8a2a2a;" onclick="deleteKO=${m.id};render();">🗑️</button>` : ''}
              </div>
            `;
            }

            return `
            <div class="match-item">
              <div class="match-teams">
                <span><span class="flag">${flagOf(m.team1)}</span> ${m.team1}</span>
                <span class="vs">vs</span>
                <span>${m.team2} <span class="flag">${flagOf(m.team2)}</span></span>
              </div>
              <div class="match-pred-count">${predCount}/${totalPlayers} Predicted</div>
              <div class="match-pred-details">${predDetails}</div>
              ${resultHtml}
              ${actionsHtml}
            </div>
          `;
        }

        // ─── SAVE PREDICTIONS ───
        function savePreds(id) {
            const preds = {};
            PLAYERS.forEach(p => {
                const s1 = document.getElementById(`pred_${p}_s1`)?.value || '';
                const s2 = document.getElementById(`pred_${p}_s2`)?.value || '';
                const w = document.getElementById(`pred_${p}_w`)?.value || '';
                if (s1 || s2 || w) {
                    preds[p] = { score1: s1, score2: s2, winner: w };
                }
            });
            withRev(prev => ({
                ...prev,
                matches: prev.matches.map(m => m.id === id ? { ...m, predictions: preds } : m)
            }));
            say('✅ Predictions saved!');
            pModal = null;
            render();
        }

        // ─── SAVE RESULT ───
        function saveResult(id) {
            const s1 = document.getElementById('r_s1')?.value || '';
            const s2 = document.getElementById('r_s2')?.value || '';
            const winner = document.getElementById('r_winner')?.value || '';
            if (!winner.trim()) { say('⚠️ Please enter a winner'); return; }
            withRev(prev => ({
                ...prev,
                matches: prev.matches.map(m => m.id === id ? { ...m, result: { winner: winner.trim(), score1: s1,
                        score2: s2 } } : m)
            }));
            say('✅ Result saved!');
            rModal = null;
            render();
        }

        // ─── IMPORT ───
        function doImport() {
            const txt = document.querySelector('textarea')?.value || '';
            try {
                const d = JSON.parse(txt);
                if (!Array.isArray(d.matches)) throw new Error('Missing matches array');
                const savedById = Object.fromEntries(d.matches.map(m => [m.id, m]));
                const merged = BASE_MATCHES.map(bm => {
                    const saved = savedById[bm.id];
                    return { ...bm, predictions: saved?.predictions || {}, result: saved?.result || null };
                });
                const extra = d.matches.filter(m => m.stage && m.stage !== "Group Stage");
                const maxId = Math.max(72, ...d.matches.map(m => m.id || 0));
                withRev(() => ({
                    matches: [...merged, ...extra],
                    nid: d.nid || d.nextId || maxId + 1,
                    awards: d.awards || {},
                    awardPreds: d.awardPreds || {},
                    standings: d.standings || {},
                    standingPreds: d.standingPreds || {},
                }));
                document.querySelector('textarea').value = '';
                say('✅ Imported!');
            } catch (e) {
                say('❌ Invalid JSON: ' + e.message);
            }
        }

        // ─── START ───
        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
