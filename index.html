<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PredictCup 2026</title>
    <style>
        /* ─── RESET & BASE ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e17;
            color: #e8edf5;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 16px;
            min-height: 100vh;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1f2b;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3526;
            border-radius: 8px;
        }
        .app {
            max-width: 1440px;
            margin: 0 auto;
        }
        .text-gold {
            color: #ffd54a;
        }
        .text-muted {
            color: #6b6450;
        }
        .text-sm {
            font-size: 13px;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .mb-8 {
            margin-bottom: 8px;
        }
        .flex {
            display: flex;
        }
        .gap-8 {
            gap: 8px;
        }
        .items-center {
            align-items: center;
        }
        .justify-between {
            justify-content: space-between;
        }
        .w-full {
            width: 100%;
        }
        .hidden {
            display: none !important;
        }

        /* ─── KEYFRAMES ─── */
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(6px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes floatAnim {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-9px) rotate(6deg);
            }
        }
        @keyframes shimmer {
            0% {
                background-position: -150% center;
            }
            100% {
                background-position: 250% center;
            }
        }
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-14px);
            }
        }
        @keyframes ringSpin {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes popIn {
            from {
                transform: scale(0.85);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes loadFill {
            0% {
                transform: translateX(-110%);
            }
            100% {
                transform: translateX(280%);
            }
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -14px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        .pc-float {
            animation: floatAnim 5.5s ease-in-out infinite;
        }
        .pc-fade-up {
            animation: fadeUp 0.55s cubic-bezier(0.2, 0.8, 0.3, 1) both;
        }
        .pc-pop-in {
            animation: popIn 0.4s cubic-bezier(0.2, 0.8, 0.3, 1) both;
        }
        .pc-shimmer {
            background: linear-gradient(135deg, #f0c94b, #f5a623, #f0c94b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 2.8s ease-in-out infinite;
        }
        .pc-bounce {
            animation: bounce 1.2s ease-in-out infinite;
        }
        .pc-ring-spin {
            animation: ringSpin 1.4s linear infinite;
        }
        .pc-card-hover {
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.3, 1), box-shadow 0.2s ease, border-color 0.2s ease;
        }
        .pc-card-hover:hover {
            transform: translateY(-3px);
            border-color: #4a4330;
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 213, 74, 0.08);
        }

        /* ─── HEADER ─── */
        .header {
            background: linear-gradient(145deg, #141b28, #1a2332);
            border: 1px solid #2a3450;
            border-radius: 20px;
            padding: 20px 28px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff2d2d, #00a859, #0057b8, #ffd54a);
            opacity: 0.6;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .brand .num {
            font-size: 44px;
            font-weight: 800;
            font-family: 'Segoe UI', sans-serif;
        }
        .brand .title {
            font-size: 24px;
            font-weight: 700;
            color: #ffd54a;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: -0.5px;
        }
        .brand .sub {
            font-size: 11px;
            color: #7f8daa;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }
        .trophy {
            font-size: 36px;
        }

        .header-mid {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #1a2334;
        }
        .players {
            display: flex;
            gap: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #c8d2e6;
        }
        .players span {
            position: relative;
            padding-bottom: 2px;
        }
        .players span::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #ffd54a66, transparent);
            border-radius: 2px;
        }
        .admin-btn {
            background: #1a1f2b;
            color: #9a9488;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid #2e2818;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .admin-btn:hover {
            background: #2a2430;
            color: #e8edf5;
        }
        .admin-btn.active {
            background: #2a1f0a;
            color: #ffd54a;
            border-color: #b8860b;
        }

        .lb-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #1a2334;
        }
        .lb-chip {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #1a1f2b;
            padding: 2px 12px;
            border-radius: 30px;
            border: 1px solid #2e281855;
            font-size: 12px;
            font-weight: 500;
        }
        .lb-chip.gold {
            border-color: #ffd54a99;
            box-shadow: 0 0 0 1px #ffd54a33 inset;
            background: #1f1a0a;
        }
        .lb-chip .pts {
            color: #ffd54a;
            font-weight: 700;
        }
        .lb-chip .done {
            color: #6b6450;
            font-size: 11px;
        }
        .lb-chip .medal {
            font-size: 14px;
        }

        /* ─── TABS ─── */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: #0f141e;
            padding: 4px;
            border-radius: 12px;
            border: 1px solid #1a2334;
            flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #9a9488;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            min-width: 60px;
            text-align: center;
        }
        .tab-btn:hover {
            color: #e8edf5;
            background: #1a1f2b;
        }
        .tab-btn.active {
            color: #ffd54a;
            background: #1a2334;
            border-bottom: 2px solid #ffd54a;
        }
        .tab-btn .icon {
            display: block;
            font-size: 16px;
            margin-bottom: 2px;
        }

        /* ─── SEARCH & FILTER ─── */
        .search-wrap {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-wrap input {
            flex: 1;
            background: #1a1f2b;
            border: 1px solid #2e2818;
            color: #e8edf5;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            outline: none;
            min-width: 180px;
            font-family: inherit;
        }
        .search-wrap input:focus {
            border-color: #ffd54a;
        }
        .search-wrap input::placeholder {
            color: #6b6450;
        }
        .group-filter {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .group-filter button {
            background: #1a1f2b;
            border: 1px solid #2e2818;
            color: #9a9488;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .group-filter button:hover {
            color: #e8edf5;
        }
        .group-filter button.active {
            background: #ffd54a;
            color: #1a1408;
            border-color: #ffd54a;
        }

        /* ─── MATCH GRID ─── */
        .group-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
        }
        .group-card {
            background: #131b26;
            border-radius: 16px;
            border: 1px solid #253040;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .group-card:hover {
            border-color: #3e5277;
        }
        .group-header {
            background: #1a2334;
            padding: 10px 16px;
            font-weight: 700;
            font-size: 16px;
            border-bottom: 1px solid #253040;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .group-header .count {
            font-weight: 400;
            font-size: 12px;
            color: #7f8daa;
        }

        /* ─── MATCH ITEM ─── */
        .match-item {
            padding: 10px 14px;
            border-bottom: 1px solid #1a2334;
            transition: background 0.15s;
        }
        .match-item:last-child {
            border-bottom: none;
        }
        .match-item:hover {
            background: #1a1f2b33;
        }
        .match-teams {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
            align-items: center;
        }
        .match-teams .vs {
            color: #4f6185;
            font-weight: 300;
            font-size: 12px;
        }
        .match-teams .flag {
            font-size: 14px;
        }
        .match-teams .team-name {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .match-pred-count {
            font-size: 11px;
            color: #7f8daa;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .match-pred-details {
            display: flex;
            flex-wrap: wrap;
            gap: 2px 14px;
            font-size: 12px;
            color: #9aa9c7;
        }
        .match-pred-details .pred {
            display: flex;
            align-items: center;
            gap: 2px;
            background: #0f141e;
            padding: 0 8px;
            border-radius: 12px;
            border: 1px solid #1a2334;
        }
        .match-pred-details .pred .name {
            font-weight: 600;
            color: #c8d2e6;
        }
        .match-pred-details .pred .pts {
            font-weight: 600;
            font-size: 10px;
        }
        .match-pred-details .pred .pts.good {
            color: #4ade80;
        }
        .match-pred-details .pred .pts.bad {
            color: #fca5a5;
        }
        .match-pred-details .pred .pts.mid {
            color: #facc15;
        }
        .match-result {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px dashed #1f2a3d;
            font-size: 12px;
        }
        .match-result .label {
            color: #6f7f9e;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-weight: 600;
        }
        .match-result .score {
            font-weight: 700;
            color: #f0c94b;
            font-size: 13px;
        }
        .match-result .winner {
            background: #1e2a3f;
            padding: 0 12px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 11px;
            color: #b8ccf0;
        }
        .match-result .winner.draw {
            color: #9aa9c7;
        }
        .match-actions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .match-actions button {
            background: #1a1f2b;
            border: 1px solid #2e2818;
            color: #9a9488;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .match-actions button:hover {
            background: #2a2430;
            color: #e8edf5;
        }
        .match-actions button.gold {
            background: #2a1f0a;
            color: #ffd54a;
            border-color: #b8860b;
        }
        .match-actions button.danger {
            color: #fca5a5;
            border-color: #8a2a2a;
        }
        .match-actions button.danger:hover {
            background: #4a1818;
        }

        /* ─── SEMI-FINAL SPECIAL ─── */
        .semi-section {
            margin-top: 24px;
            border-top: 2px solid #1a2334;
            padding-top: 20px;
        }
        .semi-section .semi-title {
            font-family: 'Segoe UI', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #ffd54a;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .semi-section .semi-title .badge {
            font-size: 12px;
            font-weight: 400;
            color: #7f8daa;
            background: #1a2334;
            padding: 2px 14px;
            border-radius: 30px;
        }
        .semi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }
        .semi-card {
            background: #131b26;
            border-radius: 16px;
            border: 1px solid #253040;
            padding: 24px 28px;
            text-align: center;
            transition: border-color 0.2s, transform 0.2s;
            position: relative;
            overflow: hidden;
        }
        .semi-card:hover {
            border-color: #ffd54a44;
            transform: translateY(-2px);
        }
        .semi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ffd54a, #f5a623, #ffd54a);
            opacity: 0.5;
        }
        .semi-card .semi-teams {
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 18px;
            font-weight: 600;
            padding: 8px 0;
        }
        .semi-card .semi-teams .team {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .semi-card .semi-teams .flag {
            font-size: 28px;
        }
        .semi-card .semi-vs {
            font-size: 22px;
            font-weight: 700;
            color: #ffd54a;
            padding: 4px 16px;
            background: #1a1f2b;
            border-radius: 30px;
            border: 1px solid #2e2818;
        }
        .semi-card .semi-result {
            margin-top: 10px;
            font-weight: 600;
            color: #f0c94b;
            font-size: 16px;
            padding: 4px 0;
        }
        .semi-card .semi-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }
        .semi-card .semi-actions button {
            background: #1a1f2b;
            border: 1px solid #2e2818;
            color: #9a9488;
            padding: 6px 24px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .semi-card .semi-actions button:hover {
            background: #2a2430;
            color: #e8edf5;
        }
        .semi-card .semi-actions button.gold {
            background: #2a1f0a;
            color: #ffd54a;
            border-color: #b8860b;
        }
        .semi-card .semi-actions button.gold:hover {
            background: #3a2f1a;
        }
        .semi-card .semi-preds {
            margin-top: 12px;
            font-size: 12px;
            color: #9aa9c7;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 12px;
            justify-content: center;
        }
        .semi-card .semi-preds .sp {
            background: #0f141e;
            padding: 0 10px;
            border-radius: 12px;
            border: 1px solid #1a2334;
        }
        .semi-card .semi-preds .sp .name {
            font-weight: 600;
            color: #c8d2e6;
        }
        .semi-card .semi-preds .sp .pts {
            font-weight: 600;
            font-size: 10px;
        }

        /* ─── SHARE TAB ─── */
        .share-section {
            background: #131b26;
            border-radius: 16px;
            border: 1px solid #253040;
            padding: 24px;
        }
        .share-section .desc {
            font-size: 13px;
            color: #9a9488;
            margin-bottom: 14px;
            line-height: 1.7;
        }
        .share-section .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .share-section .btn-group button {
            background: #1a1f2b;
            border: 1px solid #2e2818;
            color: #9a9488;
            padding: 6px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .share-section .btn-group button:hover {
            background: #2a2430;
            color: #e8edf5;
        }
        .share-section .btn-group button.gold {
            background: #2a1f0a;
            color: #ffd54a;
            border-color: #b8860b;
        }
        .share-section .btn-group button.gold:hover {
            background: #3a2f1a;
        }
        .share-section .btn-group button.danger {
            color: #fca5a5;
            border-color: #8a2a2a;
        }
        .share-section .btn-group button.danger:hover {
            background: #4a1818;
        }
        .share-section textarea {
            width: 100%;
            height: 160px;
            background: #0b0e17;
            border: 1px solid #2e2818;
            color: #e8edf5;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            resize: vertical;
            outline: none;
        }
        .share-section textarea:focus {
            border-color: #ffd54a;
        }
        .share-section .import-btn {
            margin-top: 10px;
            padding: 6px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            background: #2a1f0a;
            color: #ffd54a;
            border: 1px solid #b8860b;
            transition: all 0.2s;
        }
        .share-section .import-btn:hover {
            background: #3a2f1a;
        }
        .share-section .preview {
            margin-top: 16px;
            background: #0b0e17;
            border: 1px solid #1a2334;
            border-radius: 8px;
            padding: 12px;
            max-height: 260px;
            overflow-y: auto;
        }
        .share-section .preview pre {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #6b6450;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
        }
        .share-section .preview .label {
            font-weight: 600;
            color: #9a9488;
            font-size: 12px;
            margin-bottom: 6px;
        }

        /* ─── MODAL ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }
        .modal {
            background: #141b28;
            border: 1px solid #2e2818;
            border-radius: 20px;
            padding: 28px 32px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.8);
            animation: modalIn 0.25s cubic-bezier(0.2, 0.8, 0.3, 1) both;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h2 {
            font-family: 'Segoe UI', sans-serif;
            color: #ffd54a;
            font-size: 20px;
            margin-bottom: 4px;
        }
        .modal .sub {
            font-size: 13px;
            color: #9a9488;
            margin-bottom: 14px;
        }
        .modal .field-group {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .modal .field-group label {
            font-weight: 600;

        function calcPts(preds, result, stage) {
            if (!result?.winner) return {};
            const isBig = BIG_STAGES.includes(stage);
            const isKO = KNOCKOUT_STAGES.includes(stage);
            const winPt = isBig ? 2 : 1;
            const exactPt = isBig ? 3 : 2;
            const drawBonusPt = isBig ? 2.5 : 1.5;
            const actualWasDrawScore = numEq(result.score1, result.score2);
            const out = {};
            PLAYERS.forEach(p => {
                const r = preds?.[p];
                if (!r?.winner) { out[p] = 0; return; }
                const ok = r.winner.trim().toLowerCase() === result.winner.trim().toLowerCase();
                if (!ok) { out[p] = 0; return; }
                const exact = numEq(r.score1, result.score1) && numEq(r.score2, result.score2);
                if (exact) { out[p] = exactPt; return; }
                if (isKO && isPredictedDraw(r) && actualWasDrawScore) { out[p] = drawBonusPt; return; }
                out[p] = winPt;
            });
            return out;
        }

                    const guessTeam = guess?.team?.trim();
                    const actualTeam = actual?.team?.trim();
                    if (!guessPlayer || !actualPlayer) { perAward[key] = 0; return; }
                    if (guessPlayer.toLowerCase() === actualPlayer.toLowerCase()) {

                    } else if (guessTeam && actualTeam && guessTeam.toLowerCase() === actualTeam.toLowerCase()) {

                const total = Object.values(perAward).reduce((a, b) => a + b, 0) + ballBootBonus;
                out[p] = { perAward, total, ballBootBonus };
            });
            return out;

        // ─── GROUP TABLE ───
        function computeGroupTable(group) {
            const gMatches = app.matches.filter(m => m.stage === "Group Stage" && m.group === group);
            const teams = [...new Set(gMatches.flatMap(m => [m.team1, m.team2]))];
            const stats = Object.fromEntries(teams.map(t => [t, { team: t, P: 0, W: 0, D: 0, L: 0, GF: 0, GA: 0, GD: 0,
                Pts: 0 }]));
            let playedCount = 0;
            gMatches.forEach(m => {
                if (!m.result?.winner) return;
                playedCount++;
                const s1 = Number(m.result.score1),
                    s2 = Number(m.result.score2);
                const t1 = stats[m.team1],
                    t2 = stats[m.team2];
                t1.P++;
                t2.P++;
                t1.GF += s1;
                t1.GA += s2;
                t2.GF += s2;
                t2.GA += s1;
                if (s1 > s2) { t1.W++;
                    t1.Pts += 3;
                    t2.L++; } else if (s2 > s1) { t2.W++;
                    t2.Pts += 3;
                    t1.L++; } else { t1.D++;
                    t2.D++;
                    t1.Pts += 1;
                    t2.Pts += 1; }
            });
            teams.forEach(t => { stats[t].GD = stats[t].GF - stats[t].GA; });
            const table = teams.map(t => stats[t]).sort((a, b) => b.Pts - a.Pts || b.GD - a.GD || b.GF - a.GF || a.team
                .localeCompare(b.team));
            const totalMatches = gMatches.length;
            return { table, complete: playedCount === totalMatches && totalMatches > 0 };
        }

        }

        // ─── SET AWARD RESULTS ───
        function setAwardResults() {
            let fields = '';
            AWARD_KEYS.forEach(key => {
                const a = app.awards?.[key] || { player: '', team: '' };
                fields += `
              <div style="margin-bottom:8px;">
                <div style="font-weight:600;color:#9a9488;font-size:12px;">${AWARD_LABELS[key]}</div>
                <div style="display:flex;gap:6px;">
                  <input class="pc-input" style="flex:1;padding:4px 8px;" placeholder="Player" value="${a.player||''}" id="ar_${key}_player" />
                  <input class="pc-input" style="flex:1;padding:4px 8px;" placeholder="Team" value="${a.team||''}" id="ar_${key}_team" />
                </div>
              </div>
            `;
            });
            const html = `
            <div class="modal-overlay" onclick="if(event.target===this){document.querySelector('.award-result-modal').remove();render();}">
              <div class="modal award-result-modal" onclick="event.stopPropagation();">
                <h2>📝 Set Actual Award Winners</h2>
                <div class="scroll-y">${fields}</div>
                <div class="actions">
                  <button onclick="document.querySelector('.award-result-modal').closest('.modal-overlay').remove();render();">Cancel</button>
                  <button class="gold" onclick="saveAwardResults();">💾 Save</button>
                </div>
              </div>
            </div>
          `;
            const container = document.createElement('div');
            container.innerHTML = html;
            document.body.appendChild(container.firstChild);
        }

        function saveAwardResults() {
            const vals = {};
            AWARD_KEYS.forEach(key => {
                vals[key] = {
                    player: document.getElementById(`ar_${key}_player`)?.value || '',
                    team: document.getElementById(`ar_${key}_team`)?.value || ''
                };
            });
            withRev(prev => ({ ...prev, awards: vals }));
            say('✅ Award results saved!');
            document.querySelector('.award-result-modal')?.closest('.modal-overlay')?.remove();
            render();
        }

        // ─── SET STANDING RESULTS ───
        function setStandingResults() {
            let fields = '';
            STANDING_KEYS.forEach(key => {
                const a = app.standings?.[key] || '';
                fields += `
              <div style="margin-bottom:8px;">
                <div style="font-weight:600;color:#9a9488;font-size:12px;">${STANDING_LABELS[key]}</div>
                <input class="pc-input" style="padding:4px 8px;" placeholder="Team" value="${a}" id="sr_${key}" />
              </div>
            `;
            });
            const html = `
            <div class="modal-overlay" onclick="if(event.target===this){document.querySelector('.stand-result-modal').remove();render();}">
              <div class="modal stand-result-modal" onclick="event.stopPropagation();">
                <h2>📝 Set Actual Standings</h2>
                <div class="scroll-y">${fields}</div>
                <div class="actions">
                  <button onclick="document.querySelector('.stand-result-modal').closest('.modal-overlay').remove();render();">Cancel</button>
                  <button class="gold" onclick="saveStandingResults();">💾 Save</button>
                </div>
              </div>
            </div>
          `;
            const container = document.createElement('div');
            container.innerHTML = html;
            document.body.appendChild(container.firstChild);
        }

        function saveStandingResults() {
            const vals = {};
            STANDING_KEYS.forEach(key => {
                vals[key] = document.getElementById(`sr_${key}`)?.value || '';
            });
            withRev(prev => ({ ...prev, standings: vals }));
            say('✅ Final standings saved!');
            document.querySelector('.stand-result-modal')?.closest('.modal-overlay')?.remove();
            render();
        }

        // ─── IMPORT ───
        function doImport() {
            const txt = document.querySelector('textarea')?.value || '';
            try {
                const d = JSON.parse(txt);
                if (!Array.isArray(d.matches)) throw new Error('Missing matches array');
                const savedById = Object.fromEntries(d.matches.map(m => [m.id, m]));
                const merged = BASE_MATCHES.map(bm => {
                    const saved = savedById[bm.id];
                    return { ...bm, predictions: saved?.predictions || {}, result: saved?.result || null };
                });
                const extra = d.matches.filter(m => m.stage && m.stage !== "Group Stage");
                const maxId = Math.max(72, ...d.matches.map(m => m.id || 0));
                withRev(() => ({
                    matches: [...merged, ...extra],
                    nid: d.nid || d.nextId || maxId + 1,
                    awards: d.awards || {},
                    awardPreds: d.awardPreds || {},
                    standings: d.standings || {},
                    standingPreds: d.standingPreds || {},
                }));
                document.querySelector('textarea').value = '';
                say('✅ Imported!');
            } catch (e) {
                say('❌ Invalid JSON: ' + e.message);
            }
        }

        // ─── START ───
        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
