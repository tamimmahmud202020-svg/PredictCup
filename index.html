    /* ── Reset & Base ── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #0b0906;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
      color: #ede8d7;
      display: flex;
      justify-content: center;
      padding: 16px;
    }
    #root {
      max-width: 1260px;
      width: 100%;
      background: #15110b;
      border-radius: 32px;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.9);
      padding: 24px 28px 40px;
      border: 1px solid #2f281a;
      position: relative;
      overflow: hidden;
    }
    /* scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #15110b;
    }
    ::-webkit-scrollbar-thumb {
      background: #4a3f2a;
      border-radius: 10px;
    }
    /* ── Global classes ── */
    .pc-root {
      font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    }
    .pc-root * {
      box-sizing: border-box;
    }
    .pc-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease;
      color: #ede8d7;
      position: relative;
    }
    .pc-btn:hover {
      filter: brightness(1.12);
    }
    .pc-btn:active {
      transform: scale(0.95);
    }
    .pc-gold-btn {
      background: linear-gradient(145deg, #d4af37, #f5d742, #d4af37);
      color: #1a1408;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(212, 175, 55, 0.25);
    }
    .pc-gold-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.4);
    }
    .pc-gold-btn:active {
      transform: scale(0.96);
    }
    .pc-gold-btn::after {
      content: "";
      position: absolute;
      top: 0;
      left: -60%;
      width: 40%;
      height: 100%;
      background: linear-gradient(100deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transform: skewX(-20deg);
      transition: left 0.6s ease;
    }
    .pc-gold-btn:hover::after {
      left: 120%;
    }
    .pc-input {
      background: #1d1710;
      border: 1px solid #322a1a;
      border-radius: 12px;
      padding: 12px 16px;
      color: #ede8d7;
      font-size: 14px;
      width: 100%;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      font-family: inherit;
    }
    .pc-input:focus {
      outline: none;
      border-color: #d4af37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
      background: #241e14;
    }
    .pc-input:hover {
      border-color: #4a3f2a;
    }
    .pc-card {
      background: #1a150e;
      border: 1px solid #2a2216;
      border-radius: 16px;
      padding: 16px;
      transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.3, 1), box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .pc-card:hover {
      transform: translateY(-4px);
      border-color: #4a3f2a;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(212, 175, 55, 0.06);
    }
    .pc-fade-up {
      animation: pcFadeUp 0.55s cubic-bezier(0.2, 0.8, 0.3, 1) both;
    }
    @keyframes pcFadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .pc-pop-in {
      animation: pcPopIn 0.35s cubic-bezier(0.3, 1.3, 0.6, 1) both;
    }
    @keyframes pcPopIn {
      from {
        transform: scale(0.92);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    .pc-toast {
      animation: pcSlideDown 0.4s cubic-bezier(0.2, 0.8, 0.3, 1) both;
    }
    @keyframes pcSlideDown {
      from {
        opacity: 0;
        transform: translate(-50%, -20px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }
    .pc-modal {
      animation: pcModalIn 0.3s cubic-bezier(0.2, 0.8, 0.3, 1) both;
    }
    @keyframes pcModalIn {
      from {
        opacity: 0;
        transform: scale(0.94) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    .pc-glow-pulse {
      animation: pcPulseGlow 2.4s ease-in-out infinite;
    }
    @keyframes pcPulseGlow {
      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.3);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(212, 175, 55, 0);
      }
    }
    .pc-ring-spin {
      animation: pcRingSpin 8s linear infinite;
    }
    @keyframes pcRingSpin {
      to {
        transform: rotate(360deg);
      }
    }
    .pc-bounce {
      animation: pcBounce 1.2s ease-in-out infinite;
    }
    @keyframes pcBounce {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-16px);
      }
    }
    .pc-float {
      animation: pcFloat 6s ease-in-out infinite;
    }
    @keyframes pcFloat {
      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-12px) rotate(4deg);
      }
    }
    .pc-crown {
      animation: pcCrownBob 2.4s ease-in-out infinite;
    }
    @keyframes pcCrownBob {
      0%,
      100% {
        transform: translateY(0) rotate(-2deg);
      }
      50% {
        transform: translateY(-6px) rotate(2deg);
      }
    }
    .pc-shimmer {
      background-size: 200% auto;
      animation: pcShimmer 3.4s linear infinite;
    }
    @keyframes pcShimmer {
      to {
        background-position: 200% center;
      }
    }
    .pc-podium-bar {
      animation: pcRise 0.8s cubic-bezier(0.2, 0.8, 0.3, 1) both;
    }
    @keyframes pcRise {
      from {
        height: 0;
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    .pc-confetti {
      animation: pcConfetti 2.8s ease-in infinite;
    }
    @keyframes pcConfetti {
      0% {
        transform: translateY(-12px) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(160px) rotate(400deg);
        opacity: 0;
      }
    }
    .pc-gold-sheen {
      background-size: 250% auto;
      animation: pcGoldSheen 2.8s linear infinite;
    }
    @keyframes pcGoldSheen {
      0% {
        background-position: -150% center;
      }
      100% {
        background-position: 250% center;
      }
    }
    .pc-sparkle {
      animation: pcSparkle 2.4s ease-in-out infinite;
    }
    @keyframes pcSparkle {
      0%,
      100% {
        opacity: 0.2;
        transform: scale(0.8);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }
    .pc-strip {
      animation: pcStripPan 8s linear infinite;
    }
    @keyframes pcStripPan {
      to {
        background-position: 200% center;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .pc-fade-up,
      .pc-pop-in,
      .pc-toast,
      .pc-modal,
      .pc-glow-pulse,
      .pc-ring-spin,
      .pc-bounce,
      .pc-float,
      .pc-crown,
      .pc-shimmer,
      .pc-podium-bar,
      .pc-confetti,
      .pc-gold-sheen,
      .pc-sparkle,
      .pc-strip {
        animation: none !important;
        transition: none !important;
      }
    }

    function computeGroupTable(matches, group) {
      const gMatches = matches.filter(m => m.stage === "Group Stage" && m.group === group);
      const teams = [...new Set(gMatches.flatMap(m => [m.team1, m.team2]))];
      const stats = Object.fromEntries(teams.map(t => [t, { team: t, P: 0, W: 0, D: 0, L: 0, GF: 0, GA: 0, GD: 0,
          Pts: 0 }]));
      let playedCount = 0;
      gMatches.forEach(m => {
        if (!m.result || !m.result.winner) return;
        playedCount++;
        const s1 = Number(m.result.score1),
          s2 = Number(m.result.score2);
        const t1 = stats[m.team1],
          t2 = stats[m.team2];
        t1.P++;
        t2.P++;
        t1.GF += s1;
        t1.GA += s2;
        t2.GF += s2;
        t2.GA += s1;
        if (s1 > s2) { t1.W++;
          t1.Pts += 3;
          t2.L++; } else if (s2 > s1) { t2.W++;
          t2.Pts += 3;
          t1.L++; } else { t1.D++;
          t2.D++;
          t1.Pts += 1;
          t2.Pts += 1; }
      });
      teams.forEach(t => { stats[t].GD = stats[t].GF - stats[t].GA; });
      const table = teams.map(t => stats[t]).sort((a, b) => b.Pts - a.Pts || b.GD - a.GD || b.GF - a.GF || a.team
        .localeCompare(b.team));
      return { table, complete: playedCount === gMatches.length && gMatches.length > 0 };
    }

    function computeAllGroupTables(matches) {
      const out = {};
      ALL_GROUP_LETTERS.forEach(g => { out[g] = computeGroupTable(matches, g); });
      return out;
    }

    function rankThirdPlace(groupTables) {
      const thirds = ALL_GROUP_LETTERS.map(g => {
        const t = groupTables[g].table[2];
        return t ? { ...t, group: g } : null;
      }).filter(Boolean);
      thirds.sort((a, b) => b.Pts - a.Pts || b.GD - a.GD || b.GF - a.GF || a.group.localeCompare(b.group));
      return thirds;
    }

    function allGroupsComplete(groupTables) {
      return ALL_GROUP_LETTERS.every(g => groupTables[g].complete);
    }

    function resolveR32(matches) {
      const groupTables = computeAllGroupTables(matches);
      if (!allGroupsComplete(groupTables)) return null;
      const winnerOf = g => groupTables[g].table[0].team;
      const runnerUpOf = g => groupTables[g].table[1].team;
      const thirdsRanked = rankThirdPlace(groupTables);
      const qualifyingThirds = thirdsRanked.slice(0, 8);
      const qualifyingGroups = qualifyingThirds.map(t => t.group).sort().join("");
      const comboSlots = THIRD_PLACE_COMBO[qualifyingGroups];
      if (!comboSlots) return null;
      const slotOrder = ["A", "B", "D", "E", "G", "I", "K", "L"];
      const thirdForWinnerGroup = {};
      slotOrder.forEach((winnerGroup, idx) => {
        thirdForWinnerGroup[winnerGroup] = comboSlots[idx];
      });
      const thirdTeamByGroup = Object.fromEntries(qualifyingThirds.map(t => [t.group, t.team]));

      function resolveMatch({ a, b }) {
        function resolve(slot, otherSlot) {
          if (slot.t === "W") return winnerOf(slot.g);
          if (slot.t === "R") return runnerUpOf(slot.g);
          if (slot.t === "T") {
            const winnerGroup = otherSlot.g;
            const thirdGroup = thirdForWinnerGroup[winnerGroup];
            return thirdTeamByGroup[thirdGroup];
          }
          return null;
        }
        return [resolve(a, b), resolve(b, a)];
      }
      return R32_TEMPLATE.map(({ m, a, b }) => {
        const [team1, team2] = resolveMatch({ a, b });
        return { id: m, stage: "Round of 32", team1, team2 };
      });
    }

    function autoAdvanceBracket(matches) {
      let result = [...matches];
      const byId = id => result.find(m => m.id === id);
      const exists = id => result.some(m => m.id === id);
      const winnerOfMatch = id => {
        const m = byId(id);
        if (!m || !m.result || !m.result.winner || m.result.winner === "Draw") return null;
        return m.result.winner;
      };
      const loserOfMatch = id => {
        const m = byId(id);
        if (!m || !m.result || !m.result.winner || m.result.winner === "Draw") return null;
        return m.result.winner === m.team1 ? m.team2 : m.team1;
      };
      if (!exists(73)) {
        const r32 = resolveR32(result);
        if (r32) {
          r32.forEach(match => {
            if (match.team1 && match.team2) {
              result.push({ ...match, predictions: {}, result: null });
            }
          });
        }
      }

      function tryBuildRound(template, stageName, useLosers = false) {
        template.forEach(({ m, src }) => {
          if (exists(m)) return;
          const [s1, s2] = src;
          const team1 = useLosers ? loserOfMatch(s1) : winnerOfMatch(s1);
          const team2 = useLosers ? loserOfMatch(s2) : winnerOfMatch(s2);
          if (team1 && team2) {
            result.push({ id: m, stage: stageName, team1, team2, predictions: {}, result: null });
          }
        });
      }
      tryBuildRound(R16_TEMPLATE, "Round of 16");
      tryBuildRound(QF_TEMPLATE, "Quarter-final");
      tryBuildRound(SF_TEMPLATE, "Semi-final");
      if (!exists(103)) {
        const t1 = loserOfMatch(101),
          t2 = loserOfMatch(102);
        if (t1 && t2) result.push({ id: 103, stage: "3rd Place", team1: t1, team2: t2, predictions: {},
          result: null });
      }
      if (!exists(104)) {
        const t1 = winnerOfMatch(101),
          t2 = winnerOfMatch(102);
        if (t1 && t2) result.push({ id: 104, stage: "Final", team1: t1, team2: t2, predictions: {},
          result: null });
      }
      return result;
    }

                      fontSize: 12 }} onClick={() => onEditKO(match)}>✏️</button>
                  <button className="pc-btn" style={{ background: "#2a2216", borderRadius: 10, padding: "5px 12px",
                      fontSize: 12, color: "#f87171" }} onClick={() => onDeleteKO(match)}>🗑️</button>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    function Podium({ lb }) {
      const top3 = lb.slice(0, 3);
      const visualOrder = [1, 0, 2];
      const HEIGHT_BY_RANK = [148, 108, 76];
      return (
        <div style={{ display: "flex", justifyContent: "center", gap: 24, alignItems: "flex-end", padding: "20px 0",
            minHeight: 220 }} className="pc-fade-up">
          {visualOrder.map((rankIdx, vi) => {
            const p = top3[rankIdx];
            if (!p) return null;
            const rank = rankIdx + 1;
            const isChamp = rank === 1 && p.p > 0;
            const accentIdx = PLAYERS.indexOf(p.name);
            return (
              <div key={p.name} style={{ display: "flex", flexDirection: "column", alignItems: "center", width: 90 }}>
                {isChamp && <div style={{ fontSize: 32, marginBottom: 2 }} className="pc-crown">👑</div>}
                <div style={{ fontSize: 22 }}>{MEDALS[rankIdx]}</div>
                <div style={{ fontWeight: 700, fontSize: 15, color: "#ede8d7", marginTop: 4 }}>{p.name}</div>
                <div style={{ fontWeight: 900, color: "#f5d742", fontSize: 20 }}>{p.p}<span style={{ fontSize: 11,
                    color: "#9a8b6e", fontWeight: 700 }}> pts</span></div>
                <div className="pc-podium-bar" style={{ width: 56, height: HEIGHT_BY_RANK[rankIdx], background: rank ===
                    1 ? "linear-gradient(180deg,#ffe9a8,#f5d742 45%,#a9781a)" :
                    `linear-gradient(180deg,${HOST_ACCENTS[accentIdx]}cc,${HOST_ACCENTS[accentIdx]}3a)`,
                    borderRadius: "10px 10px 0 0", marginTop: 8, boxShadow: rank === 1 ?
                    "0 -2px 0 rgba(255,255,255,0.5) inset, 0 10px 30px rgba(212,175,55,0.35)" :
                    "0 -2px 0 rgba(255,255,255,0.12) inset, 0 8px 22px rgba(0,0,0,0.35)",
                    display: "flex", alignItems: "flex-end", justifyContent: "center", paddingBottom: 6 }}>
                  <span style={{ fontSize: 13, color: "#1a1408", fontWeight: 800 }}>{rank === 1 ? "🏆" : rank}</span>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─── HISTORY TAB ──────────────────────────────────────────────
    function HistoryTab({ app }) {
      const [selectedPlayer, setSelectedPlayer] = useState(PLAYERS[0]);
      const matches = app.matches;

      // For each match, compute points for the selected player
      const historyData = useMemo(() => {
        return matches.map(m => {
          const pred = m.predictions && m.predictions[selectedPlayer];
          const result = m.result;
          const hasResult = result && result.winner;
          let points = 0;
          if (hasResult && pred && pred.winner) {
            const ptsMap = calcPts({ [selectedPlayer]: pred }, result, m.stage);
            points = ptsMap[selectedPlayer] || 0;
          }
          return {
            id: m.id,
            stage: m.stage || "Group Stage",
            group: m.group || "",
            team1: m.team1,
            team2: m.team2,
            pred: pred || null,
            result: result || null,
            points: points,
            hasResult: hasResult
          };
        });
      }, [matches, selectedPlayer]);

      const totalPoints = historyData.reduce((sum, item) => sum + item.points, 0);

      return (
        <div>
          <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap" }}>
            {PLAYERS.map(p => (
              <button key={p} className="pc-btn" style={{ padding: "8px 20px", borderRadius: 12, background: selectedPlayer ===
                  p ? "#f5d742" : "#2a2216", color: selectedPlayer === p ? "#1a1408" : "#ede8d7", fontWeight: 700,
                  fontSize: 14, transition: "background 0.2s" }} onClick={() => setSelectedPlayer(p)}>
                {p}
              </button>
            ))}
          </div>
          <div style={{ background: "#1a150e", borderRadius: 16, border: "1px solid #2a2216", overflow: "hidden" }}>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "12px 16px", background: "#0f0c08",
                borderBottom: "1px solid #2a2216" }}>
              <span style={{ fontWeight: 700, color: "#f5d742", fontSize: 15 }}>{selectedPlayer}'s History</span>
              <span style={{ fontWeight: 700, color: "#f5d742", fontSize: 15 }}>Total: {totalPoints} pts</span>
            </div>
            <div style={{ maxHeight: 500, overflowY: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead style={{ background: "#0f0c08", borderBottom: "1px solid #2a2216" }}>
                  <tr>
                    <th style={{ padding: "8px 12px", textAlign: "left", color: "#9a8b6e" }}>Match</th>
                    <th style={{ padding: "8px 12px", textAlign: "left", color: "#9a8b6e" }}>Teams</th>
                    <th style={{ padding: "8px 12px", textAlign: "left", color: "#9a8b6e" }}>Prediction</th>
                    <th style={{ padding: "8px 12px", textAlign: "left", color: "#9a8b6e" }}>Result</th>
                    <th style={{ padding: "8px 12px", textAlign: "center", color: "#9a8b6e" }}>Pts</th>
                  </tr>
                </thead>
                <tbody>
                  {historyData.map(item => {
                    const predStr = item.pred ? `${item.pred.winner} ${item.pred.score1}–${item.pred.score2}` : "—";
                    const resultStr = item.hasResult ? `${item.result.winner} ${item.result.score1}–${item.result.score2}` :
                      "—";
                    const isCorrect = item.hasResult && item.pred && item.pred.winner && item.pred.winner.toLowerCase() ===
                      item.result.winner.toLowerCase();
                    return (
                      <tr key={item.id} style={{ borderBottom: "1px solid #1f1a10" }}>
                        <td style={{ padding: "8px 12px", color: "#6b5f44", fontFamily: "'JetBrains Mono',monospace" }}>
                          #{item.id} {item.stage}
                        </td>
                        <td style={{ padding: "8px 12px" }}>
                          {flagOf(item.team1)} {item.team1} vs {flagOf(item.team2)} {item.team2}
                        </td>
                        <td style={{ padding: "8px 12px", color: item.pred ? "#ede8d7" : "#6b5f44" }}>{predStr}</td>
                        <td style={{ padding: "8px 12px", color: item.hasResult ? (isCorrect ? "#4ade80" : "#f87171") :
                            "#6b5f44" }}>{resultStr}</td>
                        <td style={{ padding: "8px 12px", textAlign: "center", fontWeight: 700, color: item.points > 0 ?
                            "#f5d742" : "#6b5f44" }}>{item.points}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ─── MAIN APP ──────────────────────────────────────────────────
    function App() {
      const initialMatches = autoAdvanceBracket([...IMPORTED_DATA.matches]);
      const [app, setApp] = useState({
        matches: initialMatches,
        nid: IMPORTED_DATA.nid || 101,
        awards: IMPORTED_DATA.awards || {},
        awardPreds: IMPORTED_DATA.awardPreds || {},
        standings: IMPORTED_DATA.standings || {},
        standingPreds: IMPORTED_DATA.standingPreds || {},
        rev: IMPORTED_DATA.rev || 0,
        updatedAt: IMPORTED_DATA.updatedAt || null,
        updatedBy: IMPORTED_DATA.updatedBy || null
      });
      const [isAdmin, setIsAdmin] = useState(false);
      const [tab, setTab] = useState("matches");
      const [toast, setToast] = useState("");
      const [pinOpen, setPinOpen] = useState(false);
      const [pinVal, setPinVal] = useState("");
      const [pinErr, setPinErr] = useState(false);
      const [pModal, setPModal] = useState(null);
      const [rModal, setRModal] = useState(null);
      const [confirmClear, setConfirmClear] = useState(null);
      const [editKO, setEditKO] = useState(null);
      const [deleteKO, setDeleteKO] = useState(null);
      const [grpFilter, setGrpFilter] = useState("ALL");
      const [searchQ, setSearchQ] = useState("");

      const say = (msg) => { setToast(msg);
        setTimeout(() => setToast(""), 2200); };

      const withRev = (updater) => {
        setApp(prev => {
          const next = updater(prev);
          const advanced = autoAdvanceBracket(next.matches);
          return { ...next, matches: advanced, rev: (prev.rev || 0) + 1, updatedAt: Date.now(),
            updatedBy: isAdmin ? "Admin" : undefined };
        });
      };

      const savePreds = (matchId, preds) => {
        withRev(prev => ({ ...prev, matches: prev.matches.map(m => m.id === matchId ? { ...m, predictions: preds } :
            m) }));
        say("Predictions saved!");
        setPModal(null);
      };
      const saveResult = (matchId, winner, s1, s2) => {
        withRev(prev => ({ ...prev, matches: prev.matches.map(m => m.id === matchId ? { ...m, result: { winner: winner
                .trim(), score1: s1, score2: s2 } } : m) }));
        say("✅ Result saved!");
        setRModal(null);
      };
      const requestClearResult = (matchId) => { setConfirmClear(matchId); };
      const confirmClearResult = () => {
        const matchId = confirmClear;
        withRev(prev => ({ ...prev, matches: prev.matches.map(m => m.id === matchId ? { ...m, result: null } : m) }));
        say("↩️ Result cleared");
        setConfirmClear(null);
        setRModal(null);
      };
      const updateKnockout = (matchId, stage, team1, team2) => {
        withRev(prev => ({ ...prev, matches: prev.matches.map(m => m.id === matchId ? { ...m, stage, team1: team1.trim(),
              team2: team2.trim() } : m) }));
        say("✅ Match updated!");
        setEditKO(null);
      };
      const requestDeleteKnockout = (matchId) => { setDeleteKO(matchId); };
      const confirmDeleteKnockout = () => {
        const matchId = deleteKO;
        withRev(prev => ({ ...prev, matches: prev.matches.filter(m => m.id !== matchId) }));
        say("🗑️ Match removed");
        setDeleteKO(null);
      };
      const login = () => {
        if (pinVal.trim().toUpperCase() === PIN) { setIsAdmin(true);
          setPinOpen(false);
          setPinVal("");
          setPinErr(false);
          say("Admin mode"); } else setPinErr(true);
      };

      const awardPts = calcAwardPts(app.awardPreds, app.awards);
      const standingPts = calcStandingPts(app.standingPreds, app.standings);
      const lb = useMemo(() => {
        const t = Object.fromEntries(PLAYERS.map(n => [n, 0]));
        app.matches.forEach(m => {
          if (!m.result || !m.result.winner) return;
          const pts = calcPts(m.predictions, m.result, m.stage);
          PLAYERS.forEach(n => { t[n] += (pts[n] || 0); });
        });
        PLAYERS.forEach(n => { t[n] += (awardPts[n]?.total || 0);
          t[n] += (standingPts[n]?.total || 0); });
        return PLAYERS.map(n => ({ name: n, p: t[n] })).sort((a, b) => b.p - a.p);
      }, [app, awardPts, standingPts]);

      const gsMatches = app.matches.filter(m => m.stage === "Group Stage");
      const koMatches = app.matches.filter(m => m.stage !== "Group Stage");
      const q = searchQ.trim().toLowerCase();
      const matchesSearch = (m) => !q || m.team1.toLowerCase().includes(q) || m.team2.toLowerCase().includes(q);
      const filteredGs = (grpFilter === "ALL" ? gsMatches : gsMatches.filter(m => m.group === grpFilter)).filter(
        matchesSearch);
      const filteredKo = koMatches.filter(matchesSearch);

      return (
        <div className="pc-root" style={{ position: "relative" }}>

          {/* Toast */}
          {toast && <div className="pc-toast" style={{ position: "fixed", top: 24, left: "50%", transform: "translateX(-50%)",
              background: "#1a150e", border: "1px solid #f5d74255", padding: "10px 28px", borderRadius: 14,
              color: "#ede8d7", fontSize: 14, zIndex: 9999, boxShadow: "0 12px 40px rgba(0,0,0,0.8)" }}>{toast}</div>}

          {/* Header */}
          <header className="pc-fade-up" style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <span className="pc-shimmer" style={{ fontSize: 32, fontWeight: 800, fontFamily: "'Space Grotesk',sans-serif",
                    background: "linear-gradient(90deg,#f5d742,#d4af37,#f5d742)", backgroundSize: "200%",
                    WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>26</span>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 20, fontFamily: "'Space Grotesk',sans-serif",
                      color: "#ede8d7", letterSpacing: -0.5 }}>PREDICT CUP</div>
                  <div style={{ fontSize: 11, letterSpacing: 1.5, color: "#9a8b6e", fontWeight: 500 }}>FIFA WORLD CUP
                    2026™ · FAN EDITION</div>
                </div>
              </div>
              <div className="pc-crown pc-trophy-hover" style={{ fontSize: 34 }}>🏆</div>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 14, color: "#9a8b6e", fontWeight: 600 }}>Ahin · Sifat · Tamim</span>
              {isAdmin ? (
                <button className="pc-btn" style={{ background: "#2a2216", padding: "4px 16px", borderRadius: 20,
                    fontSize: 12 }} onClick={() => setIsAdmin(false)}>ADMIN ✕</button>
              ) : (
                <button className="pc-gold-btn" style={{ padding: "4px 16px", fontSize: 12 }} onClick={() =>
                    setPinOpen(true)}>Admin</button>
              )}
            </div>
            {/* Leaderboard chips */}
            <div style={{ display: "flex", flexWrap: "wrap", gap: 10, background: "#0f0c08", padding: "10px 16px",
                borderRadius: 14, border: "1px solid #2a2216" }}>
              {lb.map((p, i) => (
                <div key={p.name} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 13,
                    borderRight: i < lb.length - 1 ? "1px solid #2a2216" : "none", paddingRight: i < lb.length -
                      1 ? 14 : 0 }}>
                  {MEDALS[i]} <b style={{ fontWeight: 700 }}>{p.name}</b> <span style={{ color: "#f5d742",
                    fontWeight: 900 }}>{p.p}</span>
                </div>
              ))}
              <div style={{ fontSize: 12, color: "#6b5f44" }}>done {app.matches.filter(m => m.result?.winner).length}/
                {app.matches.length}</div>
            </div>
          </header>

          {/* Tabs */}
          <nav style={{ display: "flex", gap: 4, background: "#0f0c08", borderRadius: 14, padding: 4, marginBottom: 20,
              border: "1px solid #2a2216" }}>
            {[
              ["matches", "📋 Matches"],
              ["board", "🏅 Board"],
              ["awards", "🏆 Awards"],
              ["history", "📜 History"],
              ["knockout", "🔮 Knockout"],
              ["share", "📤 Share"]
            ].map(([t, label]) => (
              <button key={t} className="pc-btn" style={{ flex: 1, padding: "8px 0", borderRadius: 10, fontSize: 12,
                  fontWeight: 600, background: tab === t ? "#f5d74222" : "transparent", color: tab === t ?
                  "#f5d742" : "#9a8b6e", border: "1px solid transparent", borderColor: tab === t ?
                    "#f5d74244" : "transparent" }} onClick={() => setTab(t)}>
                {label}
              </button>
            ))}
          </nav>

          {/* Main content */}
          <div className="pc-pop-in">
            {tab === "matches" && (
              <>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
                  <input className="pc-input" style={{ flex: 1, minWidth: 160, background: "#0f0c08" }} value={searchQ}
                    placeholder="Search team..." onChange={e => setSearchQ(e.target.value)} />
                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                    {["ALL", ...ALL_GROUP_LETTERS].map(g => (
                      <button key={g} className="pc-btn" style={{ padding: "4px 14px", borderRadius: 8, fontSize: 11,
                          background: grpFilter === g ? "#f5d74222" : "transparent", border: "1px solid",
                          borderColor: grpFilter === g ? "#f5d74244" : "#2a2216", color: grpFilter === g ?
                            "#f5d742" : "#9a8b6e" }} onClick={() => setGrpFilter(g)}>{g === "ALL" ? "All" :
                          g}</button>
                    ))}
                  </div>
                </div>
                {filteredGs.length === 0 && filteredKo.length === 0 && (
                  <div style={{ textAlign: "center", color: "#6b5f44", padding: 40 }}>No matches found</div>
                )}
                {filteredGs.map(m => <MatchCard key={m.id} match={m} isAdmin={isAdmin} onPred={() => setPModal(m)}
                    onResult={() => setRModal(m)} onEditKO={() => {}} onDeleteKO={() => {}} />)}
                {filteredKo.length > 0 && (
                  <div style={{ marginTop: 16 }}>
                    {STAGES.filter(s => s !== "Group Stage").map(stage => {
                      const sm = filteredKo.filter(m => m.stage === stage);
                      if (!sm.length) return null;
                      return (
                        <div key={stage}>
                          <div style={{ fontWeight: 700, color: "#d4af37", margin: "16px 0 8px", fontSize: 15,
                              fontFamily: "'Space Grotesk',sans-serif" }}>{stage}</div>
                          {sm.map(m => <MatchCard key={m.id} match={m} isAdmin={isAdmin} onPred={() =>
                              setPModal(m)} onResult={() => setRModal(m)} onEditKO={() => setEditKO(m)}
                              onDeleteKO={() => requestDeleteKnockout(m.id)} />)}
                        </div>
                      );
                    })}
                  </div>
                )}
              </>
            )}

            {tab === "board" && (
              <div>
                <h2 style={{ fontWeight: 700, fontSize: 20, color: "#f5d742", marginBottom: 12, fontFamily: "'Space Grotesk',sans-serif" }}>
                  Leaderboard
                </h2>
                <Podium lb={lb} />
                {lb.map((p, i) => (
                  <div key={p.name} className="pc-card" style={{ marginBottom: 8, borderLeft: `4px solid ${HOST_ACCENTS[i]}` }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                      <span style={{ fontSize: 24, width: 32 }}>{MEDALS[i]}</span>
                      <span style={{ flex: 1, fontWeight: 700, fontSize: 16 }}>{p.name}</span>
                      <span style={{ fontWeight: 900, color: "#f5d742", fontSize: 22 }}>{p.p}</span>
                      <span style={{ fontSize: 12, color: "#6b5f44" }}>pts</span>
                      <div style={{ width: 80, background: "#0f0c08", borderRadius: 4, height: 10, overflow: "hidden",
                          marginLeft: 8 }}>
                        <div style={{ height: 10, borderRadius: 4, width: lb[0].p > 0 ? `${Math.max(6,(p.p/lb[0].p)*100)}%` :
                            "0%", background: i === 0 ? "linear-gradient(90deg,#f5d742,#ff7d6)" : i === 1 ?
                            "#9a8b6e" : "#b8743a" }} />
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {tab === "awards" && (
              <div>
                <h2 style={{ fontWeight: 700, fontSize: 20, color: "#f5d742", marginBottom: 12, fontFamily: "'Space Grotesk',sans-serif" }}>
                  Individual Awards
                </h2>
                <div className="pc-card" style={{ marginBottom: 16 }}>
                  <div style={{ fontWeight: 700, color: "#f5d742", marginBottom: 8, fontSize: 14 }}>Actual Winners</div>
                  {AWARD_KEYS.map(key => {
                    const a = app.awards && app.awards[key];
                    return (
                      <div key={key} style={{ display: "flex", justifyContent: "space-between", fontSize: 13,
                          marginBottom: 4 }}>
                        <span style={{ color: "#9a8b6e" }}>{AWARD_LABELS[key]}</span>
                        <span style={{ color: a?.player ? "#ede8d7" : "#3a3222", fontWeight: 600 }}>{a?.player ?
                          `${a.player}${a.team ? ` (${a.team})` : ""}` : "— not set —"}</span>
                      </div>
                    );
                  })}
                </div>
                {PLAYERS.map((pl, idx) => {
                  const preds = app.awardPreds && app.awardPreds[pl] ? app.awardPreds[pl] : {};
                  const pts = awardPts[pl] || { perAward: {}, total: 0, ballBootBonus: 0 };
                  return (
                    <div key={pl} className="pc-card" style={{ marginBottom: 10, borderLeft: `4px solid ${HOST_ACCENTS[idx]}` }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
                          marginBottom: 6 }}>
                        <span style={{ fontWeight: 700, color: "#f5d742", fontSize: 15 }}>{pl}</span>
                        <span style={{ fontWeight: 900, color: "#f5d742", fontSize: 16 }}>{pts.total} pts</span>
                      </div>
                      {AWARD_KEYS.map(key => {
                        const pr = preds[key];
                        return (
                          <div key={key} style={{ display: "flex", justifyContent: "space-between", fontSize: 12,
                              color: "#9a8b6e", marginBottom: 2 }}>
                            <span>{AWARD_LABELS[key]}</span>
                            <span style={{ color: pr?.player ? "#ede8d7" : "#3a3222" }}>{pr?.player ?
                              `${pr.player}${pr.team ? ` (${pr.team})` : ""}` : "—"}</span>
                          </div>
                        );
                      })}
                      {pts.ballBootBonus > 0 && <div style={{ fontSize: 12, color: "#4ade80", marginTop: 4,
                          fontWeight: 700 }}>+3 Ball+Boot bonus!</div>}
                    </div>
                  );
                })}
              </div>
            )}

            {tab === "history" && <HistoryTab app={app} />}

            {tab === "knockout" && (
              <div>
                <h2 style={{ fontWeight: 700, fontSize: 20, color: "#f5d742", marginBottom: 12, fontFamily: "'Space Grotesk',sans-serif" }}>
                  Knockout Bracket
                </h2>
                <p style={{ fontSize: 13, color: "#9a8b6e", marginBottom: 14 }}>Auto‑generated based on group results.</p>
                {filteredKo.map(m => <MatchCard key={m.id} match={m} isAdmin={isAdmin} onPred={() => setPModal(m)}
                    onResult={() => setRModal(m)} onEditKO={() => setEditKO(m)} onDeleteKO={() =>
                      requestDeleteKnockout(m.id)} />)}
              </div>
            )}

            {tab === "share" && (
              <div>
                <h2 style={{ fontWeight: 700, fontSize: 20, color: "#f5d742", marginBottom: 12, fontFamily: "'Space Grotesk',sans-serif" }}>
                  Share Data
                </h2>
                <p style={{ fontSize: 13, color: "#9a8b6e", marginBottom: 14, lineHeight: 1.6 }}>Export or import the
                  full match data, predictions, and results.</p>
                <div style={{ display: "flex", gap: 10 }}>
                  <button className="pc-gold-btn" style={{ flex: 1 }} onClick={() => { navigator.clipboard.writeText(
                      JSON.stringify(app, null, 2));
                      say("📋 Data copied!"); }}>📋 Copy JSON</button>
                  <button className="pc-gold-btn" style={{ flex: 1 }} onClick={() => { const blob = new Blob([JSON
                        .stringify(app, null, 2)], { type: "application/json" });
                      const a = document.createElement("a");
                      a.href = URL.createObjectURL(blob);
                      a.download = "predictcup_data.json";
                      a.click(); }}>⬇️ Download</button>
                </div>
              </div>
            )}
          </div>

          {/* ─── MODALS ────────────────────────────────────────── */}
          {pinOpen && (
            <Veil onBg={() => { setPinOpen(false);
              setPinVal("");
              setPinErr(false); }}>
              <div style={{ fontWeight: 700, fontSize: 18, color: "#f5d742", marginBottom: 6, fontFamily: "'Space Grotesk',sans-serif" }}>
                Admin Login
              </div>
              <p style={{ fontSize: 13, color: "#9a8b6e", margin: "0 0 14px" }}>Enter the admin passcode to edit matches
                &amp; results.</p>
              <input className="pc-input" style={{ textAlign: "center", fontSize: 20, letterSpacing: 6, marginBottom: 8,
                  fontFamily: "'JetBrains Mono',monospace", textTransform: "uppercase" }} type="password" maxLength={
                  12} placeholder="Passcode" value={pinVal} autoFocus onChange={e => { setPinVal(e.target.value);
                  setPinErr(false); }} onKeyDown={e => e.key === "Enter" && login()} />
              {pinErr && <p style={{ color: "#f87171", fontSize: 13, marginBottom: 6 }}>Wrong passcode</p>}
              <div style={{ display: "flex", gap: 10 }}>
                <button className="pc-btn" style={{ background: "#2a2216", padding: "10px 20px", borderRadius: 12,
                    flex: 1 }} onClick={() => { setPinOpen(false);
                    setPinVal(""); }}>Cancel</button>
                <button className="pc-gold-btn" style={{ flex: 1 }} onClick={login}>Login</button>
              </div>
            </Veil>
          )}

          {pModal && (
            <Veil onBg={() => setPModal(null)}>
              <div style={{ fontWeight: 700, fontSize: 16, color: "#f5d742", marginBottom: 14, fontFamily: "'Space Grotesk',sans-serif" }}>
                Predictions for #{pModal.id}
              </div>
              {PLAYERS.map(pl => {
                const pred = pModal.predictions && pModal.predictions[pl] ? pModal.predictions[pl] : { score1: "",
                  score2: "", winner: "" };
                const update = (field, val) => {
                  const newPreds = { ...pModal.predictions };
                  if (!newPreds[pl]) newPreds[pl] = { score1: "", score2: "", winner: "" };
                  newPreds[pl][field] = val;
                  savePreds(pModal.id, newPreds);
                };
                return (
                  <div key={pl} style={{ marginBottom: 14, background: "#0f0c08", padding: 12, borderRadius: 12 }}>
                    <div style={{ fontWeight: 600, color: "#f5d742", marginBottom: 6 }}>{pl}</div>
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                      <input className="pc-input" style={{ width: 56, textAlign: "center", background: "#1d1710" }}
                        value={pred.score1 || ""} placeholder="-" onChange={e => update("score1", e.target
                          .value)} />
                      <span style={{ color: "#6b5f44" }}>–</span>
                      <input className="pc-input" style={{ width: 56, textAlign: "center", background: "#1d1710" }}
                        value={pred.score2 || ""} placeholder="-" onChange={e => update("score2", e.target
                          .value)} />
                      <input className="pc-input" style={{ flex: 1, minWidth: 120, background: "#1d1710" }} value={
                        pred.winner || ""} placeholder="Winner or Draw" onChange={e => update("winner", e.target
                          .value)} />
                    </div>
                  </div>
                );
              })}
              <button className="pc-gold-btn" style={{ width: "100%" }} onClick={() => setPModal(null)}>Close</button>
            </Veil>
          )}

          {rModal && (
            <Veil onBg={() => { setRModal(null);
              setConfirmClear(null); }}>
              <div style={{ fontWeight: 700, fontSize: 16, color: "#f5d742", marginBottom: 14, fontFamily: "'Space Grotesk',sans-serif" }}>
                Result for #{rModal.id}
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
                <input className="pc-input" style={{ width: 64, textAlign: "center", background: "#1d1710" }} id="r1"
                  defaultValue={rModal.result?.score1 || ""} placeholder="-" />
                <span style={{ color: "#6b5f44" }}>–</span>
                <input className="pc-input" style={{ width: 64, textAlign: "center", background: "#1d1710" }} id="r2"
                  defaultValue={rModal.result?.score2 || ""} placeholder="-" />
                <input className="pc-input" style={{ flex: 1, minWidth: 140, background: "#1d1710" }} id="rw"
                  defaultValue={rModal.result?.winner || ""} placeholder="Winner or Draw" />
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <button className="pc-gold-btn" style={{ flex: 1 }} onClick={() => {
                  const s1 = document.getElementById("r1").value;
                  const s2 = document.getElementById("r2").value;
                  const w = document.getElementById("rw").value.trim();
                  if (!w) { say("Please enter winner"); return; }
                  saveResult(rModal.id, w, s1, s2);
                }}>Save</button>
                {rModal.result && rModal.result.winner && (
                  <button className="pc-btn" style={{ background: "#2a2216", padding: "10px 20px", borderRadius: 12,
                      color: "#f87171" }} onClick={() => requestClearResult(rModal.id)}>Clear</button>
                )}
              </div>
            </Veil>
          )}

          {confirmClear && (
            <Veil onBg={() => setConfirmClear(null)}>
              <div style={{ fontWeight: 700, fontSize: 16, color: "#f5d742", marginBottom: 8, fontFamily: "'Space Grotesk',sans-serif" }}>
                Clear this result?
              </div>
              <p style={{ fontSize: 13, color: "#9a8b6e", marginBottom: 18, lineHeight: 1.6 }}>This action cannot be
                undone.</p>
              <div style={{ display: "flex", gap: 10 }}>
                <button className="pc-btn" style={{ background: "#2a2216", padding: "10px 20px", borderRadius: 12,
                    flex: 1 }} onClick={() => setConfirmClear(null)}>Cancel</button>
                <button className="pc-btn" style={{ background: "#4a1818", padding: "10px 20px", borderRadius: 12,
                    flex: 1, color: "#fca5a5" }} onClick={confirmClearResult}>Yes, clear it</button>
              </div>
            </Veil>
          )}

          {editKO && (
            <Veil onBg={() => setEditKO(null)}>
              <div style={{ fontWeight: 700, fontSize: 16, color: "#f5d742", marginBottom: 14, fontFamily: "'Space Grotesk',sans-serif" }}>
                Edit Knockout Match #{editKO.id}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <select className="pc-input" defaultValue={editKO.stage} id="ko-stage">
                  {["Round of 32", "Round of 16", "Quarter-final", "Semi-final", "3rd Place", "Final"].map(s => <
                    option key={s}>{s}</option>)}
                </select>
                <TeamInput value={editKO.team1} onChange={(v) => document.getElementById("ko-t1").value = v}
                  placeholder="Team 1" />
                <input id="ko-t1" type="hidden" />
                <TeamInput value={editKO.team2} onChange={(v) => document.getElementById("ko-t2").value = v}
                  placeholder="Team 2" />
                <input id="ko-t2" type="hidden" />
                <button className="pc-gold-btn" onClick={() => {
                  const stage = document.getElementById("ko-stage").value;
                  const t1 = document.getElementById("ko-t1").value || editKO.team1;
                  const t2 = document.getElementById("ko-t2").value || editKO.team2;
                  updateKnockout(editKO.id, stage, t1, t2);
                }}>Save</button>
              </div>
            </Veil>
          )}

          {deleteKO && (
            <Veil onBg={() => setDeleteKO(null)}>
              <div style={{ fontWeight: 700, fontSize: 16, color: "#f5d742", marginBottom: 8, fontFamily: "'Space Grotesk',sans-serif" }}>
                Delete this match?
              </div>
              <p style={{ fontSize: 13, color: "#9a8b6e", marginBottom: 18, lineHeight: 1.6 }}>This will permanently
                remove the match.</p>
              <div style={{ display: "flex", gap: 10 }}>
                <button className="pc-btn" style={{ background: "#2a2216", padding: "10px 20px", borderRadius: 12,
                    flex: 1 }} onClick={() => setDeleteKO(null)}>Cancel</button>
                <button className="pc-btn" style={{ background: "#4a1818", padding: "10px 20px", borderRadius: 12,
                    flex: 1, color: "#fca5a5" }} onClick={confirmDeleteKnockout}>Yes, delete</button>
              </div>
            </Veil>
          )}
        </div>
      );
    }

    // ─── RENDER ──────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
