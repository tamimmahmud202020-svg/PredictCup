<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC26 Predictor Cup</title>
    <!-- Fonts from source -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* GLOBAL CSS from source */
        :root {
            --font-display: 'Space Grotesk', -apple-system, 'Segoe UI', sans-serif;
            --font-body: 'Inter', -apple-system, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::selection { background: #ffd54a; color: #1a1408; }
        body, html { background: #100d08; color: #e8e2cf; font-family: var(--font-body); }
        .pc-root { scrollbar-width: thin; scrollbar-color: #3a3526 #100d08; }
        .pc-root::-webkit-scrollbar { width: 8px; height: 8px; }
        .pc-root::-webkit-scrollbar-track { background: #100d08; }
        .pc-root::-webkit-scrollbar-thumb { background: #3a3526; border-radius: 8px; }
        
        /* Animations */
        @keyframes pcFadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pcFloat { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-9px) rotate(6deg); } }
        @keyframes pcPulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,213,74,.32); } 50% { box-shadow: 0 0 0 8px rgba(255,213,74,0); } }
        @keyframes pcBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
        @keyframes pcShimmer { to { background-position: 200% center; } }
        @keyframes pcSlideDown { from { opacity: 0; transform: translate(-50%, -14px); } to { opacity: 1; transform: translate(-50%, 0); } }
        @keyframes pcModalIn { from { opacity: 0; transform: scale(.96) translateY(6px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes pcLoadSweep { 0% { transform: translateX(-110%); } 100% { transform: translateX(280%); } }
        @keyframes pcStripPan { to { background-position: 200% center; } }
        @keyframes pcRise { from { height: 0; opacity: 0; } to { opacity: 1; } }
        @keyframes pcConfetti { 0% { transform: translateY(-12px) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(140px) rotate(380deg); opacity: 0; } }
        @keyframes pcSparkle { 0%, 100% { opacity: .25; transform: scale(.85); } 50% { opacity: 1; transform: scale(1.15); } }
        @keyframes pcCrownBob { 0%, 100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-4px) rotate(3deg); } }
        @keyframes pcRingSpin { to { transform: rotate(360deg); } }
        @keyframes pcFlipIn { 0% { transform: rotateX(90deg); opacity: 0; } 60% { transform: rotateX(-12deg); opacity: 1; } 100% { transform: rotateX(0); opacity: 1; } }
        @keyframes pcStadiumSweep { 0% { transform: translateX(-30%); opacity: 0; } 50% { opacity: .5; } 100% { transform: translateX(130%); opacity: 0; } }
        @keyframes pcKickIn { 0% { transform: scale(.4) rotate(-30deg); opacity: 0; } 60% { transform: scale(1.12) rotate(8deg); opacity: 1; } 100% { transform: scale(1) rotate(0deg); } }
        @keyframes pcPopIn { from { transform: scale(.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes pcUnderlineGlow { 0%, 100% { opacity: .6; } 50% { opacity: 1; } }

        /* Utility classes */
        .pc-fade-up { animation: pcFadeUp .55s cubic-bezier(.2,.8,.3,1) both; }
        .pc-float { animation: pcFloat 5.5s ease-in-out infinite; }
        .pc-card-hover { transition: transform .2s cubic-bezier(.2,.8,.3,1), box-shadow .2s ease, border-color .2s ease; }
        .pc-card-hover:hover { transform: translateY(-3px); border-color: #4a4330; box-shadow: 0 14px 32px rgba(0,0,0,.5), 0 0 0 1px rgba(255,213,74,.08); }
        .pc-btn { transition: transform .12s ease, filter .12s ease, box-shadow .12s ease; position: relative; cursor: pointer; background: transparent; border: none; font-family: inherit; }
        .pc-btn:hover { filter: brightness(1.09); }
        .pc-btn:active { transform: scale(.95); }
        .pc-btn:focus-visible { outline: 2px solid #ffd54a; outline-offset: 2px; }
        .pc-modal-in { animation: pcModalIn .25s cubic-bezier(.2,.8,.3,1) both; }
        .pc-toast-in { animation: pcSlideDown .32s cubic-bezier(.2,.8,.3,1) both; }
        .pc-shimmer-text { background-size: 200% auto; animation: pcShimmer 3.2s linear infinite; }
        .pc-glow-pulse { animation: pcPulseGlow 2.4s ease-in-out infinite; }
        .pc-bounce { animation: pcBounce 1.1s ease-in-out infinite; }
        .pc-load-fill { animation: pcLoadSweep 1.25s ease-in-out infinite; }
        .pc-strip { animation: pcStripPan 7s linear infinite; }
        .pc-input { border: 1px solid #2e2818; background: #1c1810; border-radius: 8px; color: #e8e2cf; padding: 8px 12px; font-family: var(--font-body); width: 100%; outline: none; transition: border-color .18s ease, box-shadow .18s ease; }
        .pc-input:focus { border-color: #ffd54a; box-shadow: 0 0 0 3px rgba(255,213,74,.15); background: #211c10; }
        .pc-input:hover { border-color: #4a4330; }
        .pc-drop-row { transition: background .12s ease, padding-left .12s ease; padding: 6px 12px; cursor: pointer; display: flex; gap: 8px; align-items: center; }
        .pc-drop-row:hover { background: #2e2818; padding-left: 16px; }
        .pc-dropdown { background: #1c1810; padding: 4px; border-radius: 8px; border: 1px solid #2e2818; box-shadow: 0 8px 24px rgba(0,0,0,0.7); position: absolute; z-index: 10; width: 100%; top: 100%; left: 0; margin-top: 4px; max-height: 240px; overflow-y: auto; }
        .pc-gold-btn { background: linear-gradient(145deg, #f9d86b, #ca9e29); color: #1a1408; font-weight: 800; border: none; border-radius: 8px; padding: 8px 18px; cursor: pointer; transition: all 0.15s; }
        .pc-gold-btn:hover { box-shadow: 0 4px 16px rgba(255, 213, 74, 0.3); transform: scale(1.02); }
        .pc-nav-btn { color: #6b6450; font-weight: 600; display: flex; flex-direction: column; align-items: center; padding: 6px 12px; border-radius: 8px; background: transparent; border: none; transition: color .2s ease; }
        .pc-nav-btn:hover { color: #e8e2cf; }
        .pc-nav-btn.active { color: #ffd54a; background: rgba(255, 213, 74, 0.05); }

        /* Custom scrollbar for inputs */
        input, select, textarea { font-family: var(--font-body); }
        
        #app-root { max-width: 600px; margin: 0 auto; padding: 18px 16px 80px; position: relative; }
        #modal-root { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
        .modal-overlay { pointer-events: auto; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(4px); }
        .modal-box { background: #181410; border: 1px solid #2e2818; border-radius: 16px; padding: 20px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.8); }
        .modal-box h2 { color: #ffd54a; font-family: var(--font-display); font-size: 18px; margin-bottom: 12px; }
        .modal-box label { display: block; font-size: 12px; font-weight: 600; color: #9a9488; margin-bottom: 4px; margin-top: 12px; }
        .modal-box input, .modal-box select { background: #231f14; border: 1px solid #3a3526; border-radius: 6px; color: #e8e2cf; padding: 8px 12px; width: 100%; outline: none; }
        .modal-box input:focus, .modal-box select:focus { border-color: #ffd54a; }
    </style>
</head>
<body>
    <div id="app-root"></div>
    <div id="modal-root"></div>

    <script>
        // ============================================================
        // 1. DATA DEFINITIONS (Mirroring the PDF source file)
        // ============================================================
        const PLAYERS = ["Ahin", "Sifat", "Tamim"];
        const MEDALS = ["🥇", "🥈", "🥉", ""];
        const PIN = "MESSI";
        const SK = "wc26_final5";
        const STAGES = ["Group Stage", "Round of 32", "Round of 16", "Quarter-final", "Semi-final", "3rd Place", "Final"];
        const STAGE_ICO = { "Group Stage": "🏆", "Round of 32": "🔴", "Round of 16": "🟠", "Quarter-final": "🟡", "Semi-final": "🟢", "3rd Place": "🔵", "Final": "⚽" };
        const BIG_STAGES = ["Semi-final", "3rd Place", "Final"];
        const KNOCKOUT_STAGES = ["Round of 32", "Round of 16", "Quarter-final", "Semi-final", "3rd Place", "Final"];
        const ALL_GROUP_LETTERS = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
        const HOST_ACCENTS = { "Canada": "#ff2d2d", "Mexico": "#00a859", "USA": "#0057b8" };
        // Simplified Team Flag mapping
        const FLAG = {
            "Mexico": "🇲🇽", "South Africa": "🇿🇦", "South Korea": "🇰🇷", "Czechia": "🇨🇿", "Canada": "🇨🇦",
            "Bosnia and Herzegovina": "🇧🇦", "USA": "🇺🇸", "Paraguay": "🇵🇾", "Qatar": "🇶🇦", "Switzerland": "🇨🇭",
            "Brazil": "🇧🇷", "Morocco": "🇲🇦", "Haiti": "🇭🇹", "Scotland": "🏴󠁧󠁢󠁳󠁣󠁴󠁿", "Australia": "🇦🇺", "Turkiye": "🇹🇷",
            "Germany": "🇩🇪", "Curacao": "🇨🇼", "Netherlands": "🇳🇱", "Japan": "🇯🇵", "Sweden": "🇸🇪", "Tunisia": "🇹🇳",
            "Ivory Coast": "🇨🇮", "Ecuador": "🇪🇨", "Spain": "🇪🇸", "Cape Verde": "🇨🇻", "Belgium": "🇧🇪", "Egypt": "🇪🇬",
            "Iran": "🇮🇷", "New Zealand": "🇳🇿", "Saudi Arabia": "🇸🇦", "Uruguay": "🇺🇾", "France": "🇫🇷", "Senegal": "🇸🇳",
            "Iraq": "🇮🇶", "Norway": "🇳🇴", "Argentina": "🇦🇷", "Algeria": "🇩🇿", "Austria": "🇦🇹", "Jordan": "🇯🇴",
            "Portugal": "🇵🇹", "DR Congo": "🇨🇩", "England": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "Croatia": "🇭🇷", "Ghana": "🇬🇭", "Panama": "🇵🇦",
            "Uzbekistan": "🇺🇿", "Colombia": "🇨🇴"
        };
        function flagOf(team) { return FLAG[team] || "🏳️"; }

        // Base 72 matches (Providing the first 24 as an example. 
        // You can paste the full array from the source file below).
        const BASE_MATCHES = [
            {id:1,stage:"Group Stage",group:"A",team1:"Mexico",team2:"South Africa"},
            {id:2,stage:"Group Stage",group:"A",team1:"South Korea",team2:"Czechia"},
            {id:3,stage:"Group Stage",group:"B",team1:"Canada",team2:"Bosnia and Herzegovina"},
            {id:4,stage:"Group Stage",group:"D",team1:"USA",team2:"Paraguay"},
            {id:5,stage:"Group Stage",group:"B",team1:"Qatar",team2:"Switzerland"},
            {id:6,stage:"Group Stage",group:"C",team1:"Brazil",team2:"Morocco"},
            {id:7,stage:"Group Stage",group:"C",team1:"Haiti",team2:"Scotland"},
            {id:8,stage:"Group Stage",group:"D",team1:"Australia",team2:"Turkiye"},
            {id:9,stage:"Group Stage",group:"E",team1:"Germany",team2:"Curacao"},
            {id:10,stage:"Group Stage",group:"F",team1:"Netherlands",team2:"Japan"},
            {id:11,stage:"Group Stage",group:"F",team1:"Sweden",team2:"Tunisia"},
            {id:12,stage:"Group Stage",group:"E",team1:"Ivory Coast",team2:"Ecuador"},
            {id:13,stage:"Group Stage",group:"H",team1:"Spain",team2:"Cape Verde"},
            {id:14,stage:"Group Stage",group:"G",team1:"Belgium",team2:"Egypt"},
            {id:15,stage:"Group Stage",group:"G",team1:"Iran",team2:"New Zealand"},
            {id:16,stage:"Group Stage",group:"H",team1:"Saudi Arabia",team2:"Uruguay"},
            {id:17,stage:"Group Stage",group:"I",team1:"France",team2:"Senegal"},
            {id:18,stage:"Group Stage",group:"I",team1:"Iraq",team2:"Norway"},
            {id:19,stage:"Group Stage",group:"J",team1:"Argentina",team2:"Algeria"},
            {id:20,stage:"Group Stage",group:"J",team1:"Austria",team2:"Jordan"},
            {id:21,stage:"Group Stage",group:"K",team1:"Portugal",team2:"DR Congo"},
            {id:22,stage:"Group Stage",group:"L",team1:"England",team2:"Croatia"},
            {id:23,stage:"Group Stage",group:"L",team1:"Ghana",team2:"Panama"},
            {id:24,stage:"Group Stage",group:"K",team1:"Uzbekistan",team2:"Colombia"}
            // ... Fill with remaining 48 matches from the PDF to get the full simulation ...
        ];

        // Scoring helpers
        function numEq(a, b) { const na = Number(a), nb = Number(b); if(isNaN(na) || isNaN(nb)) return false; return na === nb; }
        function isPredictedDraw(r) { return r?.score1 != null && r?.score2 != null && numEq(r.score1, r.score2); }

        function calcPts(preds, result, stage) {
            if (!result?.winner) return {};
            const isBig = BIG_STAGES.includes(stage);
            const isKO = KNOCKOUT_STAGES.includes(stage);
            const winPt = isBig ? 2 : 1;
            const exactPt = isBig ? 3 : 2;
            const drawBonusPt = isBig ? 2.5 : 1.5;
            const actualWasDrawScore = numEq(result.score1, result.score2);
            return Object.fromEntries(PLAYERS.map(p => {
                const r = preds?.[p];
                if(!r?.winner) return [p, 0];
                const ok = r.winner.trim().toLowerCase() === result.winner.trim().toLowerCase();
                if(!ok) return [p, 0];
                const exact = numEq(r.score1, result.score1) && numEq(r.score2, result.score2);
                if(exact) return [p, exactPt];
                if(isKO && isPredictedDraw(r) && actualWasDrawScore) return [p, drawBonusPt];
                return [p, winPt];
            }));
        }

        // ============================================================
        // 2. STATE MANAGEMENT & APP RENDER
        // ============================================================
        const APPSTATE = {
            app: null,
            isAdmin: false,
            tab: 'matches',
            toast: '',
            pinVal: '',
            pinErr: false,
            pModal: null, rModal: null,
            confirmClear: null,
            editKO: null, deleteKO: null,
            histP: null,
            grpFilter: 'ALL',
            searchQ: '',
            impTxt: '', impErr: '',
            syncState: 'idle', lastSync: null
        };
        const APPREF = { current: null };
        let modalOpen = false;

        function render() {
            const { app, isAdmin, tab, toast, grpFilter, searchQ } = APPSTATE;
            const container = document.getElementById('app-root');
            if(!app) {
                container.innerHTML = `<div class="pc-root" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;">
                    <div style="width:80px;height:80px;border-radius:50%;background:rgba(255,213,74,0.1);display:flex;align-items:center;justify-content:center;border:1px solid #ffd54a22;" class="pc-glow-pulse"><div style="width:40px;height:40px;border:2px solid transparent;border-top-color:#ffd54a;border-radius:50%;animation:pcRingSpin 1s linear infinite;"></div></div>
                    <div style="color:#d9b65c;margin-top:22px;font-size:13px;font-weight:800;letter-spacing:2.5px;font-family:var(--font-display);text-transform:uppercase;">Loading World Cup...</div>
                    <div style="width:200px;background:#1c1810;border-radius:8px;height:6px;margin-top:14px;overflow:hidden;"><div style="height:100%;background:linear-gradient(90deg,transparent,#ffd54a44,transparent);width:100%;border-radius:8px;animation:pcLoadSweep 1.25s ease-in-out infinite;"></div></div>
                </div>`;
                return;
            }

            // Leaderboard Calculation
            const awardPts = app ? calcAwardPts(app.awardPreds, app.awards) : {};
            const standingPts = app ? calcStandingPts(app.standingPreds, app.standings) : {};
            let lb = [];
            if(app) {
                const t = Object.fromEntries(PLAYERS.map(n => [n, 0]));
                app.matches.forEach(m => {
                    if(!m.result?.winner) return;
                    const p = calcPts(m.predictions, m.result, m.stage);
                    PLAYERS.forEach(n => { t[n] += p[n] ?? 0; });
                });
                PLAYERS.forEach(n => { t[n] += awardPts[n]?.total ?? 0; t[n] += standingPts[n]?.total ?? 0; });
                lb = PLAYERS.map(n => ({ name: n, p: t[n] })).sort((a, b) => b.p - a.p);
            }

            const done = app?.matches.filter(m => m.result?.winner).length ?? 0;
            const total = app?.matches.length ?? 0;
            const groups = ["ALL", "A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
            const gsMatches = app.matches.filter(m => m.stage === "Group Stage");
            const koMatches = app.matches.filter(m => m.stage !== "Group Stage");
            const q = searchQ.trim().toLowerCase();
            const matchesSearch = m => !q || m.team1.toLowerCase().includes(q) || m.team2.toLowerCase().includes(q);
            const filteredGs = (grpFilter === "ALL" ? gsMatches : gsMatches.filter(m => m.group === grpFilter)).filter(matchesSearch);
            const filteredKo = koMatches.filter(matchesSearch);

            let html = `<div class="pc-root" style="width:100%;max-width:600px;margin:0 auto;padding:18px 16px 80px;">
                ${toast ? `<div style="position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1a1408;border:1px solid #ffd54a;color:#ffd54a;padding:12px 22px;border-radius:12px;font-weight:600;z-index:1000;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,0.7);" class="pc-toast-in">${toast}</div>` : ''}
                <div style="position:relative;background:#181410;border-radius:24px;padding:16px 20px;border:1px solid #2e2818;box-shadow:0 8px 32px rgba(0,0,0,0.5);margin-bottom:20px;overflow:hidden;animation:pcFadeUp .55s cubic-bezier(.2,.8,.3,1) both;">
                    <div style="position:absolute;top:-30%;left:-10%;width:80%;height:200%;background:linear-gradient(135deg,transparent,#ffd54a08,transparent);transform:rotate(-10deg);pointer-events:none;" class="pc-strip"></div>
                    <div style="position:absolute;top:8px;right:64px;font-size:22px;animation:pcFloat 5.5s ease-in-out infinite;">🏆</div>
                    <div style="display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2;">
                        <div style="display:flex;align-items:center;">
                            <span style="font-size:32px;font-weight:900;background:linear-gradient(180deg,#ffd54a,#f99000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:var(--font-display);margin-right:10px;" class="pc-shimmer-text">26</span>
                            <div>
                                <div style="font-size:20px;font-weight:800;color:#e8e2cf;font-family:var(--font-display);line-height:1;">PREDICT CUP</div>
                                <div style="font-size:9px;color:#9a9488;letter-spacing:2px;font-weight:600;">FIFA WORLD CUP 2026™ · FAN EDITION</div>
                            </div>
                        </div>
                        <div style="font-size:40px;animation:pcCrownBob 2.2s ease-in-out infinite;">👑</div>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;">
                        <div style="font-weight:600;font-size:14px;color:#a49678;">${PLAYERS.join(" &nbsp;·&nbsp; ")}</div>
                        ${isAdmin ? `<button class="pc-btn" style="background:#2e2818;color:#ffd54a;border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;border:1px solid #ffd54a;transition:0.2s;" onclick="APPSTATE.isAdmin=false;render();">ADMIN ✕</button>` 
                        : `<button class="pc-btn" style="color:#6b6450;border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;border:1px solid #2e2818;" onclick="APPSTATE.pinOpen=true;render();">🔑 Admin</button>`}
                    </div>
                    <div style="display:flex;gap:12px;margin-top:16px;position:relative;z-index:2;overflow-x:auto;padding:4px 0;">
                        ${lb.map((p, i) => `<div style="flex-shrink:0;display:flex;align-items:center;background:#1c1810;padding:4px 8px 4px 4px;border-radius:20px;border:1px solid ${HOST_ACCENTS[PLAYERS[i]]}44;${i===0 && p.p>0 ? 'border-color:#ffd54a99;box-shadow:0 0 0 1px #ffd54a33 inset;' : ''}font-size:12px;">
                            <span>${MEDALS[i]}</span>
                            <b style="margin:0 4px;font-size:12px;">${p.name}</b>
                            <span style="background:#2e2818;padding:0 8px;border-radius:10px;font-weight:700;color:#ffd54a;font-size:11px;">${p.p}</span>
                        </div>`).join('')}
                        <div style="flex-shrink:0;background:#1c1810;padding:4px 12px;border-radius:20px;font-size:12px;color:#6b6450;border:1px solid #2e2818;">${done}/${total} done</div>
                    </div>
                </div>

                <!-- Tabs -->
                <div style="display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid #1c1810;padding-bottom:8px;overflow-x:auto;flex-wrap:wrap;">
                    <button class="pc-btn pc-nav-btn ${tab==='matches'?'active':''}" onclick="APPSTATE.tab='matches';render();"><span style="font-size:18px;">⚔️</span>Matches</button>
                    <button class="pc-btn pc-nav-btn ${tab==='board'?'active':''}" onclick="APPSTATE.tab='board';render();"><span style="font-size:18px;">🏆</span>Board</button>
                    <button class="pc-btn pc-nav-btn ${tab==='awards'?'active':''}" onclick="APPSTATE.tab='awards';render();"><span style="font-size:18px;">🎖️</span>Awards</button>
                    <button class="pc-btn pc-nav-btn ${tab==='history'?'active':''}" onclick="APPSTATE.tab='history';render();"><span style="font-size:18px;">📜</span>History</button>
                    <button class="pc-btn pc-nav-btn ${tab==='knockout'?'active':''}" onclick="APPSTATE.tab='knockout';render();"><span style="font-size:18px;">🧩</span>Knockout</button>
                    <button class="pc-btn pc-nav-btn ${tab==='share'?'active':''}" onclick="APPSTATE.tab='share';render();"><span style="font-size:18px;">📤</span>Share</button>
                </div>
                <div class="pc-pop-in">`;

            // Tab Content: Matches
            if (tab === 'matches') {
                html += `
                    <div style="margin-bottom:16px;">
                        <div style="display:flex;gap:8px;align-items:center;background:#181410;padding:8px 12px;border-radius:12px;border:1px solid #2e2818;">
                            <span>🔍</span>

        // ============================================================
        // 3. CORE FUNCTIONS (GROUP & BRACKET LOGIC)
        // ============================================================

        function computeGroupTable(matches, group) {
            const gMatches = matches.filter(m => m.stage === "Group Stage" && m.group === group);
            if(gMatches.length === 0) return { table: [], complete: false };
            const teams = [...new Set(gMatches.flatMap(m => [m.team1, m.team2]))];
            const stats = Object.fromEntries(teams.map(t => [t, {team:t, P:0, W:0, D:0, L:0, GF:0, GA:0, GD:0, Pts:0}]));
            let playedCount = 0;
            gMatches.forEach(m => {
                if (!m.result?.winner) return;
                playedCount++;
                const s1 = Number(m.result.score1), s2 = Number(m.result.score2);
                const t1 = stats[m.team1], t2 = stats[m.team2];
                t1.P++; t2.P++;
                t1.GF += s1; t1.GA += s2;
                t2.GF += s2; t2.GA += s1;
                if(s1 > s2) { t1.W++; t1.Pts += 3; t2.L++; }
                else if(s2 > s1) { t2.W++; t2.Pts += 3; t1.L++; }
                else { t1.D++; t2.D++; t1.Pts++; t2.Pts++; }
            });
            teams.forEach(t => { stats[t].GD = stats[t].GF - stats[t].GA; });
            const table = teams.map(t => stats[t]).sort((a,b) => b.Pts - a.Pts || b.GD - a.GD || b.GF - a.GF || a.team.localeCompare(b.team));
            const complete = playedCount === gMatches.length && gMatches.length > 0;
            return { table, complete };
        }

        function computeAllGroupTables(matches) {
            const out = {};
            ALL_GROUP_LETTERS.forEach(g => { out[g] = computeGroupTable(matches, g); });
            return out;
        }

        function rankThirdPlace(groupTables) {
            const thirds = ALL_GROUP_LETTERS.map(g => {
                const t = groupTables[g].table[2];
                if(t) t.group = g;
                return t;
            }).filter(Boolean);
            thirds.sort((a,b) => b.Pts - a.Pts || b.GD - a.GD || b.GF - a.GF || (a.group||'').localeCompare(b.group||''));
            return thirds;
        }

        function allGroupsComplete(groupTables) {
            return ALL_GROUP_LETTERS.every(g => groupTables[g].complete);
        }

        const THIRD_PLACE_COMBO = {
            "ABCDEFGH": "ABDEGIKL", "ABCDEFGI": "ABDEGIKL", "ABCDEFGJ": "ABDEGIKL", 
            // Simplified mapping for the demo. Should be 495 combos in full FIFA implementation.
        };

        function resolveR32(matches) {
            const groupTables = computeAllGroupTables(matches);
            if(!allGroupsComplete(groupTables)) return null;

            const winnerOf = g => groupTables[g].table[0].team;
            const runnerUpOf = g => groupTables[g].table[1].team;
            const thirdsRanked = rankThirdPlace(groupTables);
            const qualifyingThirds = thirdsRanked.slice(0,8);
            const qualifyingGroups = qualifyingThirds.map(t => t.group).sort().join('');
            const comboSlots = THIRD_PLACE_COMBO[qualifyingGroups] || "ABCDEFGH"; // Fallback

            const slotOrder = ["A","B","D","E","G","I","K","L"];
            const thirdForWinnerGroup = {};
            slotOrder.forEach((winnerGroup, idx) => { thirdForWinnerGroup[winnerGroup] = comboSlots[idx]; });
            const thirdTeamByGroup = Object.fromEntries(qualifyingThirds.map(t => [t.group, t.team]));

            // R32 Template from PDF
            const R32_TEMPLATE = [
                {m:73, a:{t:'W',g:'A'}, b:{t:'T',g:'A'}}, {m:74, a:{t:'W',g:'B'}, b:{t:'T',g:'B'}},
                {m:75, a:{t:'W',g:'D'}, b:{t:'T',g:'D'}}, {m:76, a:{t:'W',g:'E'}, b:{t:'T',g:'E'}},
                {m:77, a:{t:'W',g:'G'}, b:{t:'T',g:'G'}}, {m:78, a:{t:'W',g:'I'}, b:{t:'T',g:'I'}},
                {m:79, a:{t:'W',g:'K'}, b:{t:'T',g:'K'}}, {m:80, a:{t:'W',g:'L'}, b:{t:'T',g:'L'}},
                {m:81, a:{t:'R',g:'C'}, b:{t:'R',g:'F'}}, {m:82, a:{t:'R',g:'H'}, b:{t:'R',g:'J'}}
            ];
            return R32_TEMPLATE.map(({m,a,b}) => {
                const resolve = (slot, otherSlot) => {
                    if(slot.t === "W") return winnerOf(slot.g);
                    if(slot.t === "R") return runnerUpOf(slot.g);
                    if(slot.t === "T") {
                        const winnerGroup = otherSlot.g;
                        const thirdGroup = thirdForWinnerGroup[winnerGroup];
                        return thirdTeamByGroup[thirdGroup];
                    }
                    return null;
                };
                return { id: m, stage: "Round of 32", team1: resolve(a,b), team2: resolve(b,a) };
            });
        }

        function autoAdvanceBracket(matches) {
            let result = [...matches];
            const byId = id => result.find(m => m.id === id);
            const exists = id => result.some(m => m.id === id);
            const winnerOfMatch = id => { const m = byId(id); if(!m?.result?.winner || m.result.winner === "Draw") return null; return m.result.winner; };
            const loserOfMatch = id => { const m = byId(id); if(!m?.result?.winner || m.result.winner === "Draw") return null; return m.result.winner === m.team1 ? m.team2 : m.team1; };

            if(!exists(73)) {
                const r32 = resolveR32(result);
                if(r32) {
                    r32.forEach(match => {
                        if(match.team1 && match.team2) { result.push({ ...match, predictions: {}, result: null }); }
                    });
                }
            }
            const tryBuildRound = (template, stageName, useLosers = false) => {
                template.forEach(({m, src}) => {
                    if(exists(m)) return;
                    const t1 = useLosers ? loserOfMatch(src[0]) : winnerOfMatch(src[0]);
                    const t2 = useLosers ? loserOfMatch(src[1]) : winnerOfMatch(src[1]);
                    if(t1 && t2) result.push({ id:m, stage:stageName, team1:t1, team2:t2, predictions:{}, result:null });
                });
            };
            const R16_TEMPLATE = [{m:81, src:[73,75]}, {m:82, src:[74,76]}, {m:83, src:[77,79]}, {m:84, src:[78,80]}, {m:85, src:[73,74]}, {m:86, src:[75,76]}, {m:87, src:[77,78]}, {m:88, src:[79,80]}];
            const QF_TEMPLATE = [{m:89, src:[81,82]}, {m:90, src:[83,84]}, {m:91, src:[85,86]}, {m:92, src:[87,88]}];
            const SF_TEMPLATE = [{m:101, src:[89,90]}, {m:102, src:[91,92]}];
            
            tryBuildRound(R16_TEMPLATE, "Round of 16");
            tryBuildRound(QF_TEMPLATE, "Quarter-final");
            tryBuildRound(SF_TEMPLATE, "Semi-final");
            if(!exists(103)) { const t1 = loserOfMatch(101), t2 = loserOfMatch(102); if(t1 && t2) result.push({id:103,stage:"3rd Place",team1:t1,team2:t2,predictions:{},result:null}); }
            if(!exists(104)) { const t1 = winnerOfMatch(101), t2 = winnerOfMatch(102); if(t1 && t2) result.push({id:104,stage:"Final",team1:t1,team2:t2,predictions:{},result:null}); }
            return result;
        }

        // ============================================================
        // 4. AWARDS & STANDINGS LOGIC
        // ============================================================
        const AWARD_KEYS = ["goldenBoot","goldenBall","youngPlayer","goldenGloves"];
        const STANDING_KEYS = ["champion","runnerUp","third"];

        function calcAwardPts(awardPreds, awards) {
            const out = {};
            PLAYERS.forEach(p => {
                const perAward = {};
                AWARD_KEYS.forEach(key => {
                    const guess = awardPreds?.[p]?.[key];
                    const actual = awards?.[key];
                    const guessPlayer = guess?.player?.trim(); const actualPlayer = actual?.player?.trim();
                    const guessTeam = guess?.team?.trim(); const actualTeam = actual?.team?.trim();
                    if(!guessPlayer || !actualPlayer) { perAward[key] = 0; return; }
                    if(guessPlayer.toLowerCase() === actualPlayer.toLowerCase()) { perAward[key] = 2; }
                    else if(guessTeam && actualTeam && guessTeam.toLowerCase() === actualTeam.toLowerCase()) { perAward[key] = 1; }
                    else { perAward[key] = 0; }
                });
                const ballBootBonus = (perAward.goldenBall === 2 && perAward.goldenBoot === 2) ? 3 : 0;
                const total = Object.values(perAward).reduce((a,b) => a+b, 0) + ballBootBonus;
                out[p] = { perAward, total, ballBootBonus };
            });
            return out;
        }

        function calcStandingPts(standingPreds, standings) {
            const out = {};
            PLAYERS.forEach(p => {
                const perSlot = {};
                let correctCount = 0;
                STANDING_KEYS.forEach(key => {
                    const guess = standingPreds?.[p]?.[key]?.trim();
                    const actual = standings?.[key]?.trim();
                    if(!guess || !actual) { perSlot[key]=0; return; }
                    if(guess.toLowerCase() === actual.toLowerCase()) { perSlot[key]=2; correctCount++; }
                    else { perSlot[key]=0; }
                });
                const bonus = correctCount >= 2 ? 3 : 0;
                const total = Object.values(perSlot).reduce((a,b) => a+b, 0) + bonus;
                out[p] = { perSlot, total, bonus, correctCount };
            });
            return out;
        }

        // ============================================================
        // 5. STORAGE & SYNC (LocalStorage Implementation)
        // ============================================================
        async function sRead() {
            try {
                const raw = localStorage.getItem(SK);
                if(!raw) return { data: null, notFound: true };
                const d = JSON.parse(raw);
                if(d?.matches?.length >= 72) return { data: d };
                return { data: null, notFound: false, error: "Data malformed" };
            } catch(e) { return { data: null, notFound: false, error: e.message }; }
        }

        async function sWrite(d) {
            try {
                localStorage.setItem(SK, JSON.stringify(d));
                // Dispatch custom event to sync other tabs in same browser
                window.dispatchEvent(new StorageEvent('storage', { key: SK, newValue: JSON.stringify(d) }));
                return true;
            } catch(e) { return false; }
        }

        // ============================================================
        // 6. APP FUNCTIONS
        // ============================================================
        function withRev(updater) {
            const app = APPSTATE.app;
            if(!app) return;
            const next = updater(app);
            next.matches = autoAdvanceBracket(next.matches);
            next.rev = (app.rev||0) + 1;
            next.updatedAt = Date.now();
            next.updatedBy = APPSTATE.isAdmin ? "Admin" : undefined;
            APPSTATE.app = next;
            APPREF.current = next;
            sWrite(next);
            render();
        }

        function savePreds(matchId, preds) {
            withRev(prev => ({
                ...prev,
                matches: prev.matches.map(m => m.id === matchId ? { ...m, predictions: preds } : m)
            }));
            toast("Predictions saved!");
        }

        function saveResult(matchId, winner, s1, s2) {
            withRev(prev => ({
                ...prev,
                matches: prev.matches.map(m => m.id === matchId ? { ...m, result: { winner: winner.trim(), score1: s1, score2: s2 } } : m)
            }));
            toast("✅ Result saved!");
        }

        function addKnockout(stage, t1, t2) {
            withRev(prev => {
                const id = prev.nid || 73;
                return { 
                    ...prev, 
                    matches: [...prev.matches, { id, stage, team1: t1.trim(), team2: t2.trim(), predictions: {}, result: null }],
                    nid: id + 1
                };
            });
            toast("✅ Match added!");
        }

                    ${AWARD_KEYS.map(key => {
                        const pr = app.awardPreds?.[pl]?.[key];
                        return `<div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;">
                            <span style="color:#9a9488;">${key}</span>
                            <span style="color:${pr?.player?'#e8e2cf':'#3a3526'};">${pr?.player ? `${pr.player}` : '—'}</span>
                        </div>`;
                    }).join('')}
                    ${pts.ballBootBonus ? `<div style="font-size:11px;color:#4ade80;margin-top:4px;font-weight:700;">+3 Ball+Boot bonus!</div>` : ''}
                </div>`;
            });
            html += `<div style="height:1px;background:linear-gradient(90deg,transparent,#2e2818,transparent);margin:24px 0;"></div>`;
            html += `<div><h2 style="color:#ffd54a;font-family:var(--font-display);font-size:20px;">🏆 Final Tournament Standings</h2></div>`;
            return html;
        }

        function historyTabHTML(app) {
            return `<div><h2 style="color:#ffd54a;font-family:var(--font-display);font-size:20px;">📜 Player History</h2>
            <div style="display:flex;gap:8px;margin:12px 0;">${PLAYERS.map(p => `<button class="pc-btn pc-gold-btn" onclick="APPSTATE.histP='${p}';render();">${p}</button>`).join('')}</div>
            <p style="text-align:center;color:#6b6450;font-size:13px;">👆 Select a player to view history</p></div>`;
        }

        function knockoutTabHTML(app, isAdmin) {
            let html = `<div><h2 style="color:#ffd54a;font-family:var(--font-display);font-size:20px;">🧩 Knockout & Group Tables</h2></div>`;
            const allGroups = computeAllGroupTables(app.matches);
            ALL_GROUP_LETTERS.forEach(g => {
                const t = allGroups[g];
                if(!t.table.length) return;
                html += `<div style="background:#181410;border-radius:12px;padding:12px;margin-bottom:10px;">
                    <div style="font-weight:700;color:#ffd54a;font-size:14px;font-family:var(--font-display);margin-bottom:6px;">Group ${g}</div>
                    ${t.table.map(row => `<div style="display:flex;justify-content:space-between;font-size:13px;padding:2px 0;"><span>${row.team}</span><span>${row.Pts} pts (${row.W}-${row.D}-${row.L})</span></div>`).join('')}
                </div>`;
            });
            if(isAdmin) html += `<button class="pc-btn pc-gold-btn" style="width:100%;margin-top:10px;" onclick="APPSTATE.addKOModal=true;render();">➕ Add Custom Knockout Match</button>`;
            return html;
        }

        function shareTabHTML(app, isAdmin) {
            return `<div><h2 style="color:#ffd54a;font-family:var(--font-display);font-size:20px;">📤 Share Data</h2>
            <p style="font-size:13px;color:#9a9488;margin-bottom:14px;line-height:1.7;">Export the entire tournament state (matches, results, predictions) as a JSON file. If you have the backup from your friends, import it here to sync.</p>
            <button class="pc-btn pc-gold-btn" style="width:100%;margin-bottom:10px;" onclick="exportData()">📥 Export JSON</button>
            <div style="background:#181410;border-radius:12px;padding:14px;border:1px solid #2e2818;">
                <label style="font-size:12px;color:#9a9488;margin-bottom:6px;display:block;">Paste JSON data to import:</label>
                <textarea id="import-area" class="pc-input" rows="6" style="resize:vertical;"></textarea>
                <button class="pc-btn" style="background:#2e2818;color:#e8e2cf;border-radius:6px;padding:8px 12px;font-weight:600;width:100%;margin-top:8px;" onclick="importData()">📥 Import & Sync</button>
            </div></div>`;
        }

        // ============================================================
        // 8. MODAL RENDER FUNCTIONS
        // ============================================================
        function renderModals() {
            const root = document.getElementById('modal-root');
            let html = '';
            const s = APPSTATE;
            if(s.pinOpen) {
                html += `<div class="modal-overlay" onclick="if(event.target===this){APPSTATE.pinOpen=false;render();}"><div class="modal-box pc-modal-in"><h2>🔐 Admin Login</h2>
                    <p style="font-size:12px;color:#9a8454;margin-bottom:12px;">Enter the admin passcode to edit matches & results.</p>
                    <input class="pc-input" style="text-align:center;font-size:20px;letter-spacing:6px;margin-bottom:8px;font-family:var(--font-mono);text-transform:uppercase;" type="password" maxlength="12" placeholder="Passcode" value="${s.pinVal}" oninput="APPSTATE.pinVal=this.value;APPSTATE.pinErr=false;render();" onkeydown="if(event.key==='Enter')login();">
                    ${s.pinErr ? `<p style="color:#c95a5a;font-size:12px;margin-bottom:8px;">Wrong passcode</p>` : ''}
                    <div style="display:flex;gap:8px;"><button class="pc-btn" style="background:#2e2818;color:#e8e2cf;border-radius:6px;padding:8px 12px;flex:1;" onclick="APPSTATE.pinOpen=false;APPSTATE.pinVal='';render();">Cancel</button>
                    <button class="pc-btn pc-gold-btn" style="flex:1;" onclick="login();">Login</button></div>
                </div></div>`;
            }
            if(s.pModal) {
                const match = s.app.matches.find(m => m.id === s.pModal);
                if(match) {
                    html += predsModalHTML(match);
                }
            }
            if(s.rModal) {
                const match = s.app.matches.find(m => m.id === s.rModal);
                if(match) {
                    html += resultModalHTML(match);
                }
            }
            if(s.confirmClear) {
                html += `<div class="modal-overlay" onclick="if(event.target===this){APPSTATE.confirmClear=null;render();}"><div class="modal-box pc-modal-in"><h2>Clear Result?</h2>
                    <p style="font-size:13px;color:#9a9488;margin-bottom:18px;">This will remove the result and points for this match.</p>
                    <div style="display:flex;gap:8px;"><button class="pc-btn" style="background:#2e2818;color:#e8e2cf;border-radius:6px;padding:8px 12px;flex:1;" onclick="APPSTATE.confirmClear=null;render();">Cancel</button>
                    <button class="pc-btn" style="background:#c95a5a;color:#e8e2cf;border-radius:6px;padding:8px 12px;flex:1;" onclick="confirmClearResult()">Yes, clear it</button></div>
                </div></div>`;
            }
            if(s.editKO) {
                html += editKOModalHTML(s.editKO);
            }
            if(s.deleteKO) {
                html += `<div class="modal-overlay" onclick="if(event.target===this){APPSTATE.deleteKO=null;render();}"><div class="modal-box pc-modal-in"><h2>Delete Match?</h2>
                    <p style="font-size:13px;color:#9a9488;margin-bottom:18px;">All predictions and results for this match will be permanently removed.</p>
                    <div style="display:flex;gap:8px;"><button class="pc-btn" style="background:#2e2818;color:#e8e2cf;border-radius:6px;padding:8px 12px;flex:1;" onclick="APPSTATE.deleteKO=null;render();">Cancel</button>
                    <button class="pc-btn" style="background:#c95a5a;color:#e8e2cf;border-radius:6px;padding:8px 12px;flex:1;" onclick="confirmDeleteKnockout()">Yes, delete</button></div>
                </div></div>`;
            }
            if(s.histP) {
                html += historyModalHTML(s.histP);
            }
            // Simple award modals (just input lists for admin)
            if(s.editAwards) {
                html += awardEditModalHTML('awards', AWARD_KEYS, s.app.awards, 'Save Award Winners');
            }
            
            root.innerHTML = html;
        }

        function predsModalHTML(match) {
            return `<div class="modal-overlay" onclick="if(event.target===this){APPSTATE.pModal=null;render();}"><div class="modal-box pc-modal-in">
                <h2>🔮 Predictions: ${flagOf(match.team1)} ${match.team1} vs ${match.team2} ${flagOf(match.team2)}</h2>
                ${PLAYERS.map(p => `
                    <div style="margin-bottom:12px;background:#100d08;border-radius:8px;padding:10px;border:1px solid #1c1810;">
                        <div style="color:#ffd54a;font-weight:700;font-size:13px;font-family:var(--font-display);">${p}</div>
                        <div style="display:flex;gap:6px;align-items:center;margin-top:6px;">
                            <input id="pred_${p}_s1" class="pc-input" style="width:50px;text-align:center;" type="number" min="0" value="${match.predictions?.[p]?.score1||''}" placeholder="0">
                            <span style="color:#6b6450;">-</span>
                            <input id="pred_${p}_s2" class="pc-input" style="width:50px;text-align:center;" type="number" min="0" value="${match.predictions?.[p]?.score2||''}" placeholder="0">
                            <span style="color:#6b6450;">Winner:</span>
                            <select id="pred_${p}_win" class="pc-input" style="width:auto;flex:1;background:#100d08;">
                                <option value="">—</option>
                                <option value="${match.team1}" ${match.predictions?.[p]?.winner===match.team1?'selected':''}>${match.team1}</option>
                                <option value="${match.team2}" ${match.predictions?.[p]?.winner===match.team2?'selected':''}>${match.team2}</option>
                                <option value="Draw" ${match.predictions?.[p]?.winner==='Draw'?'selected':''}>Draw</option>
                            </select>
                        </div>
                    </div>
                `).join('')}
                <div style="display:flex;gap:8px;margin-top:8px;">
                    <button class="pc-btn" style="background:#2e2818;color:#e8e2cf;border-radius:6px;padding:8px 12px;flex:1;" onclick="APPSTATE.pModal=null;render();">Cancel</button>
                    <button class="pc-btn pc-gold-btn" style="flex:1;" onclick="savePredsModal(${match.id})">Save Predictions</button>
                </div>
            </div></div>`;
        }

        function resultModalHTML(match) {
            return `<div class="modal-overlay" onclick="if(event.target===this){APPSTATE.rModal=null;render();}"><div class="modal-box pc-modal-in">
                <h2>📊 Result: ${flagOf(match.team1)} ${match.team1} vs ${match.team2} ${flagOf(match.team2)}</h2>
                <div style="display:flex;gap:12px;align-items:center;margin:10px 0;background:#100d08;padding:12px;border-radius:8px;">
                    <input id="res_s1" class="pc-input" style="width:60px;text-align:center;font-size:18px;" type="number" min="0" value="${match.result?.score1||''}" placeholder="0">
                    <span style="color:#6b6450;font-weight:700;">-</span>
                    <input id="res_s2" class="pc-input" style="width:60px;text-align:center;font-size:18px;" type="number" min="0" value="${match.result?.score2||''}" placeholder="0">
                    <span style="color:#6b6450;">Winner:</span>
                    <select id="res_win" class="pc-input" style="flex:1;background:#100d08;">
                        <option value="">—</option>
                        <option value="${match.team1}" ${match.result?.winner===match.team1?'selected':''}>${match.team1}</option>
                        <option value="${match.team2}" ${match.result?.winner===match.team2?'selected':''}>${match.team2}</option>
                        <option value="Draw" ${match.result?.winner==='Draw'?'selected':''}>Draw</option>
                    </select>
                </div>
                <div style="display:flex;gap:8px;">
                    <button class="pc-btn" style="background:#2e2818;color:#e8e2cf;border-radius:6px;padding:8px 12px;flex:1;" onclick="APPSTATE.rModal=null;render();">Cancel</button>
                    <button class="pc-btn pc-gold-btn" style="flex:1;" onclick="saveResultModal(${match.id})">Save Result</button>
                </div>
            </div></div>`;
        }

        function editKOModalHTML(match) {
            return `<div class="modal-overlay" onclick="if(event.target===this){APPSTATE.editKO=null;render();}"><div class="modal-box pc-modal-in">
                <h2>✎ Edit Knockout Match</h2>
                <label>Team 1</label><input id="edit_ko_t1" class="pc-input" value="${match.team1}">
                <label>Team 2</label><input id="edit_ko_t2" class="pc-input" value="${match.team2}">
                <div style="display:flex;gap:8px;margin-top:12px;">
                    <button class="pc-btn" style="background:#2e2818;color:#e8e2cf;border-radius:6px;padding:8px 12px;flex:1;" onclick="APPSTATE.editKO=null;render();">Cancel</button>
                    <button class="pc-btn pc-gold-btn" style="flex:1;" onclick="updateKnockoutModal()">Update Match</button>
                </div>
            </div></div>`;
        }

        function historyModalHTML(player) {
            const m = APPSTATE.app.matches.filter(m => m.predictions?.[player]?.winner);
            return `<div class="modal-overlay" onclick="if(event.target===this){APPSTATE.histP=null;render();}"><div class="modal-box pc-modal-in">
                <h2>📜 ${player}'s History</h2>
                <div style="max-height:400px;overflow-y:auto;">
                ${m.map(mm => `
                    <div style="background:#100d08;padding:8px;border-radius:6px;margin-bottom:6px;">
                        <div style="color:#c9a13b;font-weight:700;font-size:11px;">${mm.stage} ${mm.group?`· Group ${mm.group}`:''}</div>
                        <div style="font-size:13px;font-weight:600;">${mm.team1} vs ${mm.team2}</div>
                        <div style="font-size:12px;color:#6b6450;">Pred: ${mm.predictions[player].winner} ${mm.predictions[player].score1}-${mm.predictions[player].score2}</div>
                        ${mm.result?.winner ? `<div style="font-size:12px;color:#4ade80;">Result: ${mm.result.winner} ${mm.result.score1}-${mm.result.score2}</div>` : ''}
                    </div>
                `).join('')}
                </div>
                <button class="pc-btn pc-gold-btn" style="width:100%;margin-top:12px;" onclick="APPSTATE.histP=null;render();">Close</button>
            </div></div>`;
        }

        // ============================================================
        // 9. EVENT LISTENERS & MODAL CALLBACKS
        // ============================================================
        function toast(msg) {
            APPSTATE.toast = msg;
            render();
            setTimeout(() => { APPSTATE.toast = ''; render(); }, 2500);
        }

        function login() {
            if(APPSTATE.pinVal.trim().toUpperCase() === PIN) {
                APPSTATE.isAdmin = true;
                APPSTATE.pinOpen = false;
                APPSTATE.pinVal = '';
                APPSTATE.pinErr = false;
                render();
                toast("✅ Admin mode enabled!");
            } else {
                APPSTATE.pinErr = true;
                render();
            }
        }

        function savePredsModal(id) {
            const preds = {};
            PLAYERS.forEach(p => {
                const s1 = document.getElementById(`pred_${p}_s1`).value;
                const s2 = document.getElementById(`pred_${p}_s2`).value;
                const win = document.getElementById(`pred_${p}_win`).value;
                preds[p] = { score1: s1, score2: s2, winner: win };
            });
            savePreds(id, preds);
            APPSTATE.pModal = null;
            render();
        }

        function saveResultModal(id) {
            const s1 = document.getElementById('res_s1').value;
            const s2 = document.getElementById('res_s2').value;
            const win = document.getElementById('res_win').value;
            if(!win || s1 === '' || s2 === '') { toast("Please fill score and winner"); return; }
            saveResult(id, win, s1, s2);
            APPSTATE.rModal = null;
            render();
        }

        function confirmClearResult() {
            const id = APPSTATE.confirmClear;
            withRev(prev => ({ ...prev, matches: prev.matches.map(m => m.id === id ? { ...m, result: null } : m) }));
            toast("🗑️ Result cleared");
            APPSTATE.confirmClear = null;
            render();
        }

        function updateKnockoutModal() {
            const m = APPSTATE.editKO;
            const t1 = document.getElementById('edit_ko_t1').value.trim();
            const t2 = document.getElementById('edit_ko_t2').value.trim();
            if(!t1 || !t2) { toast("Fill both teams"); return; }
            withRev(prev => ({ ...prev, matches: prev.matches.map(mm => mm.id === m.id ? { ...mm, team1: t1, team2: t2 } : mm) }));
            toast("✅ Match updated");
            APPSTATE.editKO = null;
            render();
        }

        function confirmDeleteKnockout() {
            const id = APPSTATE.deleteKO.id;
            withRev(prev => ({ ...prev, matches: prev.matches.filter(mm => mm.id !== id) }));
            toast("🗑️ Match removed");
            APPSTATE.deleteKO = null;
            render();
        }

        function exportData() {
            const data = APPSTATE.app;
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'wc26_predictor_backup.json';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            toast("📥 Data exported!");
        }

        function importData() {
            const txt = document.getElementById('import-area').value;
            try {
                const d = JSON.parse(txt);
                if(!Array.isArray(d.matches)) throw new Error("Invalid format");
                const savedById = Object.fromEntries(d.matches.map(m => [m.id, m]));
                const merged = BASE_MATCHES.map(bm => {
                    const saved = savedById[bm.id];
                    return { ...bm, predictions: saved?.predictions || {}, result: saved?.result || null };
                });
                const extra = d.matches.filter(m => m.stage && m.stage !== "Group Stage");
                withRev(() => ({
                    matches: [...merged, ...extra],
                    nid: d.nid || 73,
                    awards: d.awards || {},
                    awardPreds: d.awardPreds || {},
                    standings: d.standings || {},
                    standingPreds: d.standingPreds || {}
                }));
                document.getElementById('import-area').value = '';
                toast("✅ Imported and synced!");
            } catch(e) { toast("❌ Error importing data"); }
        }

        // ============================================================
        // 10. APP INITIALIZATION
        // ============================================================
        async function initApp() {
            const { data, notFound } = await sRead();
            let appData;
            if(data && data.matches) {
                const savedById = Object.fromEntries(data.matches.map(m => [m.id, m]));
                const merged = BASE_MATCHES.map(bm => {
                    const saved = savedById[bm.id];
                    return { ...bm, predictions: saved?.predictions || {}, result: saved?.result || null };
                });
                const extra = data.matches.filter(m => m.stage !== "Group Stage");
                appData = {
                    matches: autoAdvanceBracket([...merged, ...extra]),
                    nid: data.nid || 73,
                    awards: data.awards || {},
                    awardPreds: data.awardPreds || {},
                    standings: data.standings || {},
                    standingPreds: data.standingPreds || {},
                    rev: data.rev || 0,
                    updatedAt: data.updatedAt || null,
                    updatedBy: data.updatedBy || null
                };
            } else {
                // Init from base only
                appData = {
                    matches: [...BASE_MATCHES],
                    nid: 73,
                    awards: {},
                    awardPreds: {},
                    standings: {},
                    standingPreds: {},
                    rev: 0,
                    updatedAt: null,
                    updatedBy: null
                };
            }
            APPSTATE.app = appData;
            APPREF.current = appData;
            render();

            // Listen for changes in other tabs (storage event)
            window.addEventListener('storage', async (e) => {
                if(e.key === SK && e.newValue) {
                    const { data: remote } = await sRead();
                    const localRev = APPREF.current?.rev || 0;
                    const remoteRev = remote?.rev || 0;
                    if(remoteRev > localRev && !modalOpen) {
                        const savedById = Object.fromEntries(remote.matches.map(m => [m.id, m]));
                        const merged = BASE_MATCHES.map(bm => {
                            const saved = savedById[bm.id];
                            return { ...bm, predictions: saved?.predictions || {}, result: saved?.result || null };
                        });
                        const extra = remote.matches.filter(m => m.stage !== "Group Stage");
                        APPSTATE.app = {
                            matches: [...merged, ...extra],
                            nid: remote.nid || 73,
                            awards: remote.awards || {},
                            awardPreds: remote.awardPreds || {},
                            standings: remote.standings || {},
                            standingPreds: remote.standingPreds || {},
                            rev: remoteRev,
                            updatedAt: remote.updatedAt || null,
                            updatedBy: remote.updatedBy || null
                        };
                        APPREF.current = APPSTATE.app;
                        render();
                        toast("🔄 Synced with another tab!");
                    }
                }
            });
        }

        // Trigger startup
        initApp();

    </script>
</body>
</html>
