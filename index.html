        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --font-display: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-body: 'Inter', 'Segoe UI', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
        }
        body {
            font-family: var(--font-body);
            background: #0b0e17;
            color: #e8edf5;
            padding: 0;
            margin: 0;
            min-height: 100vh;
        }
        ::selection {
            background: #ffd54a;
            color: #1a1408;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #100d08;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3526;
            border-radius: 8px;
        }

        /* ───────────── KEYFRAMES ───────────── */
        @keyframes pcFadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pcFloat {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-9px) rotate(6deg);
            }
        }
        @keyframes pcBounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-14px);
            }
        }
        @keyframes pcRingSpin {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes pcModalIn {
            from {
                opacity: 0;
                transform: scale(.96) translateY(6px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        @keyframes pcPopIn {
            from {
                transform: scale(.85);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes pcGoldSheen {
            0% {
                background-position: -150% center;
            }
            100% {
                background-position: 250% center;
            }
        }
        @keyframes pcKickIn {
            0% {
                transform: scale(.4) rotate(-30deg);
                opacity: 0;
            }
            60% {
                transform: scale(1.12) rotate(8deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) rotate(0deg);
            }
        }
        @keyframes pcConfetti {
            0% {
                transform: translateY(-12px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translateY(140px) rotate(380deg);
                opacity: 0;
            }
        }
        @keyframes pcSlideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -14px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        @keyframes pcLoadFill {
            0% {
                transform: translateX(-110%);
            }
            100% {
                transform: translateX(280%);
            }
        }
        @keyframes pcStadiumSweep {
            0% {
                transform: translateX(-30%);
                opacity: 0;
            }
            50% {
                opacity: .5;
            }
            100% {
                transform: translateX(130%);
                opacity: 0;
            }
        }
        @keyframes pcUnderlineGlow {
            0%,
            100% {
                opacity: .6;
            }
            50% {
                opacity: 1;
            }
        }
        @keyframes pcSparkle {
            0%,
            100% {
                opacity: .25;
                transform: scale(.85);
            }
            50% {
                opacity: 1;
                transform: scale(1.15);
            }
        }

        .pc-fade-up {
            animation: pcFadeUp .55s cubic-bezier(.2, .8, .3, 1) both;
        }
        .pc-float {
            animation: pcFloat 5.5s ease-in-out infinite;
        }
        .pc-bounce {
            animation: pcBounce 1.2s ease-in-out infinite;
        }
        .pc-ring-spin {
            animation: pcRingSpin 1.4s linear infinite;
        }
        .pc-modal-in {
            animation: pcModalIn .25s cubic-bezier(.2, .8, .3, 1) both;
        }
        .pc-pop-in {
            animation: pcPopIn .4s cubic-bezier(.2, .8, .3, 1) both;
        }
        .pc-gold-sheen {

        }
        .pc-kick-in {
            animation: pcKickIn .55s cubic-bezier(.2, .8, .3, 1) both;
        }
        .pc-confetti {
            animation: pcConfetti 1.8s ease-out forwards;
        }

            transform: translateY(-3px);
            border-color: #4a4330;
            box-shadow: 0 14px 32px rgba(0, 0, 0, .5), 0 0 0 1px rgba(255, 213, 74, .08);
        }
        .pc-btn {
            transition: transform .12s ease, filter .12s ease, box-shadow .12s ease;
            position: relative;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }
        .pc-btn:hover {
            filter: brightness(1.09);
        }
        .pc-btn:active {
            transform: scale(.95);
        }
        .pc-btn:focus-visible {
            outline: 2px solid #ffd54a;
            outline-offset: 2px;
        }
        .pc-gold-btn {
            background: linear-gradient(145deg, #e8c84a, #d4a82a);

            font-weight: 700;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 13px;

        }
        .pc-gold-btn:hover {

        }

        const ALL_GROUP_LETTERS = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];

        function computeGroupTable(matches, group) {
            const gMatches = matches.filter(m => m.stage === "Group Stage" && m.group === group);
            const teams = [...new Set(gMatches.flatMap(m => [m.team1, m.team2]))];
            const stats = Object.fromEntries(teams.map(t => [t, { team: t, P: 0, W: 0, D: 0, L: 0, GF: 0, GA: 0, GD: 0,
                Pts: 0 }]));
            let playedCount = 0;
            gMatches.forEach(m => {
                if (!m.result?.winner) return;
                playedCount++;
                const s1 = Number(m.result.score1),
                    s2 = Number(m.result.score2);
                const t1 = stats[m.team1],
                    t2 = stats[m.team2];
                t1.P++;
                t2.P++;
                t1.GF += s1;
                t1.GA += s2;
                t2.GF += s2;
                t2.GA += s1;
                if (s1 > s2) { t1.W++;
                    t1.Pts += 3;
                    t2.L++; } else if (s2 > s1) { t2.W++;
                    t2.Pts += 3;
                    t1.L++; } else { t1.D++;
                    t2.D++;
                    t1.Pts += 1;
                    t2.Pts += 1; }
            });
            teams.forEach(t => { stats[t].GD = stats[t].GF - stats[t].GA; });
            const table = teams.map(t => stats[t]).sort((a, b) => b.Pts - a.Pts || b.GD - a.GD || b.GF - a.GF || a.team
                .localeCompare(b.team));
            const totalMatches = gMatches.length;
            return { table, complete: playedCount === totalMatches && totalMatches > 0 };
        }

        function computeAllGroupTables(matches) {
            const out = {};
            ALL_GROUP_LETTERS.forEach(g => { out[g] = computeGroupTable(matches, g); });
            return out;
        }

        function rankThirdPlace(groupTables) {
            const thirds = ALL_GROUP_LETTERS.map(g => {
                const t = groupTables[g].table[2];
                return t ? { ...t, group: g } : null;
            }).filter(Boolean);
            thirds.sort((a, b) => b.Pts - a.Pts || b.GD - a.GD || b.GF - a.GF || a.group.localeCompare(b.group));
            return thirds;
        }

        function allGroupsComplete(groupTables) {
            return ALL_GROUP_LETTERS.every(g => groupTables[g].complete);
        }

        function resolveR32(matches) {
            const groupTables = computeAllGroupTables(matches);
            if (!allGroupsComplete(groupTables)) return null;
            const winnerOf = g => groupTables[g].table[0].team;
            const runnerUpOf = g => groupTables[g].table[1].team;
            const thirdsRanked = rankThirdPlace(groupTables);
            const qualifyingThirds = thirdsRanked.slice(0, 8);
            const qualifyingGroups = qualifyingThirds.map(t => t.group).sort().join("");
            const comboSlots = THIRD_PLACE_COMBO[qualifyingGroups];
            if (!comboSlots) return null;
            const slotOrder = ["A", "B", "D", "E", "G", "I", "K", "L"];
            const thirdForWinnerGroup = {};
            slotOrder.forEach((winnerGroup, idx) => {
                thirdForWinnerGroup[winnerGroup] = comboSlots[idx];
            });
            const thirdTeamByGroup = Object.fromEntries(qualifyingThirds.map(t => [t.group, t.team]));

            function resolveMatch({ a, b }) {
                function resolve(slot, otherSlot) {
                    if (slot.t === "W") return winnerOf(slot.g);
                    if (slot.t === "R") return runnerUpOf(slot.g);
                    if (slot.t === "T") {
                        const winnerGroup = otherSlot.g;
                        const thirdGroup = thirdForWinnerGroup[winnerGroup];
                        return thirdTeamByGroup[thirdGroup];
                    }
                    return null;
                }
                return [resolve(a, b), resolve(b, a)];
            }

            return R32_TEMPLATE.map(({ m, a, b }) => {
                const [team1, team2] = resolveMatch({ a, b });
                return { id: m, stage: "Round of 32", team1, team2 };
            });
        }

        const R16_TEMPLATE = [
            { m: 89, src: [73, 74] },
            { m: 90, src: [75, 76] },
            { m: 91, src: [77, 78] },
            { m: 92, src: [79, 80] },
            { m: 93, src: [81, 82] },
            { m: 94, src: [83, 84] },
            { m: 95, src: [85, 86] },

            { m: 97, src: [89, 90] },
            { m: 98, src: [91, 92] },
            { m: 99, src: [93, 94] },
            { m: 100, src: [95, 96] }

        const SF_TEMPLATE = [
            { m: 101, src: [97, 98] },
            { m: 102, src: [99, 100] }

        function autoAdvanceBracket(matches) {
            let result = [...matches];
            const byId = id => result.find(m => m.id === id);
            const exists = id => result.some(m => m.id === id);
            const winnerOfMatch = id => {
                const m = byId(id);
                if (!m?.result?.winner || m.result.winner === "Draw") return null;
                return m.result.winner;
            };
            const loserOfMatch = id => {
                const m = byId(id);
                if (!m?.result?.winner || m.result.winner === "Draw") return null;
                return m.result.winner === m.team1 ? m.team2 : m.team1;
            };

            if (!exists(73)) {
                const r32 = resolveR32(result);
                if (r32) {
                    r32.forEach(match => {
                        if (match.team1 && match.team2) {
                            result.push({ ...match, predictions: {}, result: null });
                        }
                    });
                }
            }

            function tryBuildRound(template, stageName, useLosers = false) {
                template.forEach(({ m, src }) => {
                    if (exists(m)) return;
                    const [s1, s2] = src;
                    const team1 = useLosers ? loserOfMatch(s1) : winnerOfMatch(s1);
                    const team2 = useLosers ? loserOfMatch(s2) : winnerOfMatch(s2);
                    if (team1 && team2) {
                        result.push({ id: m, stage: stageName, team1, team2, predictions: {}, result: null });
                    }
                });
            }

            tryBuildRound(R16_TEMPLATE, "Round of 16");
            tryBuildRound(QF_TEMPLATE, "Quarter-final");
            tryBuildRound(SF_TEMPLATE, "Semi-final");

            if (!exists(103)) {
                const t1 = loserOfMatch(101),
                    t2 = loserOfMatch(102);
                if (t1 && t2) result.push({ id: 103, stage: "3rd Place", team1: t1, team2: t2, predictions: {},
                    result: null });
            }
            if (!exists(104)) {
                const t1 = winnerOfMatch(101),
                    t2 = winnerOfMatch(102);
                if (t1 && t2) result.push({ id: 104, stage: "Final", team1: t1, team2: t2, predictions: {},
                result: null });
            }
            return result;
        }

            } catch (e) {
                return { data: null, notFound: false, error: String(e) };

            const merged = BASE_MATCHES.map(bm => {

                return {
                    ...bm,
                    predictions: saved?.predictions || SAVED_PREDS[bm.id] || {},
                    result: saved?.result || SAVED_RESULTS[bm.id] || null,
                };
            });
            const storedExtra = (d?.matches || []).filter(m => m.stage !== "Group Stage");
            let extra = [];
            if (storedExtra.length > 0) {
                extra = storedExtra;
            } else {
                const allKO = [...SAVED_R32, ...SAVED_R16, ...SAVED_QF, ...SAVED_SF];
                extra = allKO.map(r => {
                    const stored = storedExtra.find(m => m.id === r.id);
                    return {
                        ...r,
                        stage: r.stage || "Round of 32",
                        predictions: stored?.predictions || r.predictions || {},
                        result: stored?.result || r.result || null,
                    };
                });
            }
            const allMatches = [...merged, ...extra];
            const advanced = autoAdvanceBracket(allMatches);
            app = {
                matches: advanced,
                nid: d?.nid || 73,
                awards: d?.awards || {},
                awardPreds: d?.awardPreds || SAVED_AWARD_PREDS,
                standings: d?.standings || {},
                standingPreds: d?.standingPreds || SAVED_STANDING_PREDS,
                rev: d?.rev || 0,
                updatedAt: d?.updatedAt || null,
                updatedBy: d?.updatedBy || null,
            };
            loaded = true;
            syncState = "synced";
            lastSync = Date.now();
            render();

            // poll every 20s
            setInterval(() => {
                if (pinOpen || pModal || rModal || confirmClear || editKO || deleteKO) return;
                const { data: remote } = sRead();
                if (!remote) { lastSync = Date.now(); return; }
                const localRev = app?.rev || 0;
                const remoteRev = remote.rev || 0;
                if (remoteRev > localRev) {
                    const savedById = Object.fromEntries((remote.matches || []).map(m => [m.id, m]));
                    const merged2 = BASE_MATCHES.map(bm => {
                        const saved = savedById[bm.id];
                        return { ...bm, predictions: saved?.predictions || {}, result: saved?.result || null };
                    });
                    const extra2 = (remote.matches || []).filter(m => m.stage !== "Group Stage");
                    const adv2 = autoAdvanceBracket([...merged2, ...extra2]);
                    app = {
                        matches: adv2,
                        nid: remote.nid || 73,
                        awards: remote.awards || {},
                        awardPreds: remote.awardPreds || {},
                        standings: remote.standings || {},
                        standingPreds: remote.standingPreds || {},
                        rev: remoteRev,
                        updatedAt: remote.updatedAt || null,
                        updatedBy: remote.updatedBy || null,
                    };
                    lastSync = Date.now();
                    say("🔄 Synchronized new updates");
                    render();
                } else {

            }, 20000);

        function renderPreds(preds) {
            if (!preds || Object.keys(preds).length === 0) {
                return '<span style="color:#4f6185;font-style:italic;font-size:11px;">no predictions yet</span>';
            }
            return PLAYERS.map(u => {
                const p = preds[u];
                if (!p) return '';
                const s = `${p.score1 || '?'} – ${p.score2 || '?'}`;
                const w = p.winner || '—';
                return `<span style="display:inline-flex;align-items:center;gap:2px;background:#1a2334;padding:0 6px;border-radius:12px;font-size:11px;"><span style="font-weight:600;color:#c8d2e6;">${u}</span><span style="color:#d6def0;">${s}</span>${w !== '—' ? `<span style="font-size:9px;background:#253040;padding:0 6px;border-radius:8px;color:#b0c0dd;">${w}</span>` : ''}</span>`;
            }).filter(Boolean).join('');
        }

        function renderResult(result) {
            if (!result) return '<span style="color:#6f7f9e;font-size:11px;">not played</span>';
            const w = result.winner || '—';
            const s = `${result.score1 ?? '?'} – ${result.score2 ?? '?'}`;
            const cls = w === 'Draw' ? 'color:#9aa9c7;' : 'color:#b8ccf0;';
            return `<span style="font-weight:700;color:#f0c94b;">${s}</span> <span style="background:#1e2a3f;padding:0 10px;border-radius:20px;font-weight:500;font-size:11px;${cls}">${w}</span>`;

            // Store temp preds
            if (!window._predTemp) window._predTemp = {};
            const temp = window._predTemp;
            window.updatePred = (player, field, val) => {
                if (!temp[player]) temp[player] = { score1: '', score2: '', winner: '' };
                temp[player][field] = val;
            };

            return `
            <div class="veil" onclick="if(event.target===this){pModal=null;render();}">

                </div>
              </div>
            </div>

                    preds[p] = { score1: temp[p].score1 || '', score2: temp[p].score2 || '', winner: temp[p].winner ||

                } else {
                    const existing = app.matches.find(m => m.id === id)?.predictions?.[p];
                    if (existing) preds[p] = { ...existing };

            });
            withRev(prev => ({
                ...prev,
                matches: prev.matches.map(m => m.id === id ? { ...m, predictions: preds } : m)
            }));

            window._predTemp = {};

        // ─── RESULT MODAL ───
        function renderResultModal(match) {

                <p style="font-size:13px;color:#9a9488;margin-bottom:12px;">${match.team1} vs ${match.team2} <span style="color:#6b6450;font-size:12px;">#${match.id}</span></p>

                  ${match.result ? `<button class="pc-btn" style="flex:1;background:#4a1818;color:#fca5a5;padding:8px;border-radius:8px;font-weight:600;font-size:13px;border:1px solid #8a2a2a;" onclick="rModal=null;confirmClear=${match.id};render();">↩️ Clear</button>` : ''}

                </div>
              </div>

        window.saveResultModal = (id) => {

            const s2 = document.getElementById('r_s2')?.value || '';

                matches: prev.matches.map(m => m.id === id ? { ...m, result: { winner: winner.trim(), score1: s1,

            }));

        // ─── EDIT KO MODAL ───
        function renderEditKOModal(match) {

            }));

            render();
        };

        // ─── IMPORT ───
        window.doImport = () => {
            const txt = document.querySelector('textarea')?.value || '';
            try {
                const d = JSON.parse(txt);
                if (!Array.isArray(d.matches)) throw new Error('Missing matches array');
                const savedById = Object.fromEntries(d.matches.map(m => [m.id, m]));
                const merged = BASE_MATCHES.map(bm => {
                    const saved = savedById[bm.id];
                    return { ...bm, predictions: saved?.predictions || {}, result: saved?.result || null };
                });
                const extra = d.matches.filter(m => m.stage && m.stage !== "Group Stage");
                const maxId = Math.max(72, ...d.matches.map(m => m.id || 0));
                withRev(() => ({
                    matches: [...merged, ...extra],
                    nid: d.nid || d.nextId || maxId + 1,
                    awards: d.awards || {},
                    awardPreds: d.awardPreds || {},
                    standings: d.standings || {},
                    standingPreds: d.standingPreds || {},
                }));
                document.querySelector('textarea').value = '';
                say('✅ Imported!');
            } catch (e) {
                say('❌ Invalid JSON: ' + e.message);
            }
        };

        // ─── PLAYER HISTORY ───
        function renderPlayerHistory(player) {
            const matches = app.matches.filter(m => m.predictions?.[player] && m.result?.winner);
            if (matches.length === 0) {
                return `<p style="text-align:center;color:#6b6450;font-size:13px;">${player} hasn't made any predictions for completed matches yet.</p>`;
            }
            let html = `<div style="display:flex;flex-direction:column;gap:6px;">`;
            matches.forEach(m => {
                const pr = m.predictions[player];
                const pts = calcPts({ [player]: pr }, m.result, m.stage)[player] || 0;
                const isCorrect = pr?.winner && pr.winner.trim().toLowerCase() === m.result.winner.trim().toLowerCase();
                const exact = isCorrect && numEq(pr.score1, m.result.score1) && numEq(pr.score2, m.result.score2);
                html += `
                <div style="background:#131b26;border-radius:10px;border:1px solid #253040;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;">
                  <div style="font-size:13px;">
                    <span style="color:#9a9488;">${m.stage}</span>
                    <span style="font-weight:600;">${m.team1}</span>
                    <span style="color:#4f6185;font-weight:300;">vs</span>
                    <span style="font-weight:600;">${m.team2}</span>
                  </div>
                  <div style="font-size:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                    <span style="color:#9a9488;">Pred: ${pr?.winner||'—'} ${pr?.score1||'?'}–${pr?.score2||'?'}</span>
                    <span style="color:#6b6450;">→</span>
                    <span style="color:#f0c94b;">${m.result.winner} ${m.result.score1}–${m.result.score2}</span>
                    <span style="font-weight:700;${pts>0?'color:#4ade80':'color:#fca5a5'};">${pts} pts</span>
                    ${isCorrect ? '✅' : '❌'}
                    ${exact ? '🎯' : ''}
                  </div>
                </div>
              `;
            });
            html += `</div>`;
            return html;
        }

            // Group standings
            html += `

            const preds = app.standingPreds?.[pl] || {};
            let html = `
            <div class="veil" onclick="if(event.target===this){editStandPlayer=null;render();}">
              <div class="veil-box" onclick="event.stopPropagation();">
                <h2 style="font-family:var(--font-display);color:#ffd54a;font-size:18px;margin-bottom:4px;">✎ Edit Standings — ${pl}</h2>
                <div>
          `;
            STANDING_KEYS.forEach(key => {
                html += `
                <div style="margin-bottom:8px;">
                  <div style="font-weight:600;color:#9a9488;font-size:12px;">${STANDING_LABELS[key]}</div>
                  <input class="pc-input" style="padding:4px 8px;" placeholder="Team" value="${preds[key]||''}" id="s_${key}" />
                </div>
              `;
            });
            html += `
                </div>
                <div style="display:flex;gap:8px;margin-top:12px;">
                  <button class="pc-btn" style="flex:1;background:#1a1f2b;color:#9a9488;padding:8px;border-radius:8px;font-weight:600;font-size:13px;" onclick="editStandPlayer=null;render();">Cancel</button>
                  <button class="pc-btn pc-gold-btn" style="flex:2;" onclick="saveStandEdit('${pl}');">💾 Save</button>
                </div>
              </div>
            </div>
          `;
            const container = document.createElement('div');
            container.innerHTML = html;
            const existing = document.querySelector('.veil.stand-edit');
            if (existing) existing.remove();
            container.firstChild.className += ' stand-edit';
            document.body.appendChild(container.firstChild);
        };

        window.saveStandEdit = (pl) => {
            const vals = {};
            STANDING_KEYS.forEach(key => {
                vals[key] = document.getElementById(`s_${key}`)?.value || '';
            });
            withRev(prev => ({ ...prev, standingPreds: { ...prev.standingPreds, [pl]: vals } }));
            say(`✅ ${pl}'s final picks saved!`);
            editStandPlayer = null;
            render();
        };

        // ─── START ───
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
